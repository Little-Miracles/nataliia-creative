allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}

// ВОТ НАШ НОВЫЙ БЕЗОТКАЗНЫЙ БЛОК
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            // Если у библиотеки нет своего namespace, даем ей временный
            if (project.android.namespace == null) {
                project.android.namespace = project.group
            }
        }
    }
}

// Это заставит Gradle принять настройки даже если он уже "ушел на обед"
gradle.settingsEvaluated { settings ->
    settings.gradle.rootProject.subprojects { subproject ->
        if (subproject.hasProperty('android')) {
            subproject.android.namespace = subproject.group
        }
    }
}