allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
subprojects {
    project.configurations.all {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'com.builttoroam' && details.requested.name == 'device_calendar') {
                // Это просто заставляет календарь быть на связи
            }
        }
    }
    
    // Новое «лекарство», которое срабатывает без задержек:
    afterProject { project ->
        if (project.hasProperty('android')) {
            project.android {
                if (namespace == null) {
                    namespace = "com.nataliia.smart_body_life"
                }
            }
        }
    }
}