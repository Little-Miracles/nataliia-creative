plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keyProperties = new Properties()
def keyPropertiesFile = rootProject.file('key.properties')
if (keyPropertiesFile.exists()) {
    keyProperties.load(new FileInputStream(keyPropertiesFile))
}

android {
    namespace = "com.nataliia.smart_body_life"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true 
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
        release {
            keyAlias = keyProperties['keyAlias']
            keyPassword = keyProperties['keyPassword']
            storeFile = keyProperties['storeFile'] ? file(keyProperties['storeFile']) : null
            storePassword = keyProperties['storePassword']
        }
    }

    defaultConfig {
        applicationId = "com.nataliia.smart_body_life"
        testNamespace = "com.nataliia.smart_body_life"
        
        minSdkVersion = 26 
        targetSdk = 34 
        versionCode = 1 
        versionName = "1.0.0"
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
}
// Этот блок заставляет все сторонние библиотеки использовать те же настройки Java, что и твой проект
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty("android")) {
            project.android {
                compileOptions {
                    sourceCompatibility JavaVersion.VERSION_17
                    targetCompatibility JavaVersion.VERSION_17
                }
                // Если в подпроекте используется Kotlin, усмиряем и его
                if (project.plugins.hasPlugin("kotlin-android") || project.plugins.hasPlugin("kotlin")) {
                    kotlinOptions {
                        jvmTarget = "17"
                    }
                }
            }
        }
    }
}