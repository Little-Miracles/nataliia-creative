plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keyProperties = new Properties()
def keyPropertiesFile = rootProject.file('key.properties')
if (keyPropertiesFile.exists()) {
    keyProperties.load(new FileInputStream(keyPropertiesFile))
}

android {
    namespace = "com.nataliia.smart_body_life"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        // Включаем поддержку современных библиотек Java (исправляет твою последнюю ошибку)
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    signingConfigs {
        release {
            keyAlias = keyProperties['keyAlias']
            keyPassword = keyProperties['keyPassword']
            storeFile = keyProperties['storeFile'] ? file(keyProperties['storeFile']) : null
            storePassword = keyProperties['storePassword']
        }
    }

    defaultConfig {
        applicationId = "com.nataliia.smart_body_life"
        testNamespace = "com.nataliia.smart_body_life"
        
        // Включаем поддержку больших библиотек
        multiDexEnabled true
        
        minSdkVersion 26 
        targetSdk 34 
        versionCode 2 
        versionName "2.0.0"
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
            // Добавляем сжатие ресурсов для уменьшения размера APK
            shrinkResources false 
            minifyEnabled false
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Эта библиотека помогает запускать новый код на старых версиях Android
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}