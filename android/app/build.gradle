plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keyProperties = new Properties()
def keyPropertiesFile = rootProject.file('key.properties')
if (keyPropertiesFile.exists()) {
    keyProperties.load(new FileInputStream(keyPropertiesFile))
}

android {
    namespace = "com.nataliia.smart_body_life"
    compileSdk = 34
    ndkVersion = flutter.ndkVersion

    // ВСТАВЛЯЕМ ПРИНУДИТЕЛЬНОЕ ПОНИЖЕНИЕ ДЛЯ ПЛАГИНОВ ТУТ:
    rootProject.subprojects {
        afterEvaluate { project ->
            if (project.hasProperty('android')) {
                project.android {
                    compileSdkVersion 34
                    buildToolsVersion "34.0.0"
                }
            }
        }
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }
    
    signingConfigs {
        release {
            keyAlias = keyProperties['keyAlias']
            keyPassword = keyProperties['keyPassword']
            storeFile = keyProperties['storeFile'] ? file(keyProperties['storeFile']) : null
            storePassword = keyProperties['storePassword']
        }
    }

    defaultConfig {
        applicationId = "com.nataliia.smart_body_life"
        testNamespace = "com.nataliia.smart_body_life"
        multiDexEnabled true
        
        minSdkVersion 26 
        targetSdk 34 
        versionCode 2 
        versionName "2.0.0"

        resConfigs "en", "uk", "de", "fr", "es"
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
            shrinkResources false 
            minifyEnabled false
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}