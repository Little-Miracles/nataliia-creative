name: APPLE-READY-IPA-FINAL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Install Certificates
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 21)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Декодируем сертификат
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > certificate.p12
          
          # Очищаем пароль от лишних пробелов и заходим
          PASS=$(echo "${{ secrets.P12_PASSWORD }}" | xargs)
          security import certificate.p12 -k "$KEYCHAIN_PATH" -P "$PASS" -A -T /usr/bin/codesign
          
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: 3. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: 4. Repair & Configure Project
        run: |
          flutter pub get
          rm -rf ios/Runner.xcodeproj
          PROJECT_NAME=$(grep '^name:' pubspec.yaml | awk '{print $2}')
          flutter create . --platforms ios --org com.nataliia --project-name $PROJECT_NAME
          
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = "PCSW3AKAPF";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/embed_and_thin//g' ios/Runner.xcodeproj/project.pbxproj

      - name: 5. Build Final Signed IPA
        run: |
          # Собираем IPA для App Store
          flutter build ipa --release --export-method app-store

      - name: 6. Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_Apple_Ready_IPA
          path: build/ios/ipa/*.ipa
