name: iOS Build SmartBody Life

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Prepare Identity and Pods
        run: |
          # 1. Принудительно ставим имя проекта
          flutter create . --platforms ios --org com.nataliia --project-name smart_body_life
          # 2. Чиним зависимости
          flutter pub get
          # 3. Заходим в папку ios и обновляем "трубы" (Podfile)
          cd ios
          pod install
          cd ..

      - name: Build IPA (Final Fix)
        run: |
          # Мы добавляем --verbose, чтобы если упадет, Котик рассказал ВСЁ
          # И явно указываем, что нам не нужна подпись
          flutter build ipa --release --no-codesign --verbose

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_Life_App
          # Путь к приложению (оно будет лежать в архиве)
          path: build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app
