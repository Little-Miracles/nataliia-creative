name: SmartBody iOS Stable Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get
          cd ios
          pod install
          cd ..

      - name: Fix iOS build config
        run: |
          flutter precache --ios
          flutter clean
          flutter pub get

      - name: Build IPA (SAFE MODE)
        run: |
          flutter build ipa --release --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_Life_IPA
          path: build/ios/ipa/*.ipa
