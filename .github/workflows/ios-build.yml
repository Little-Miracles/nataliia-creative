name: iOS Direct Archive
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Build Archive
        run: |
          flutter pub get
          # Собираем архив БЕЗ подписи, чтобы Котик пролетел этот этап за 15 минут
          flutter build ipa --release --no-codesign
            
      - name: Upload XCArchive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smart-body-life-archive
          # Мы забираем всю папку архива. Это самый ценный результат.
          path: build/ios/archive/Runner.xcarchive
