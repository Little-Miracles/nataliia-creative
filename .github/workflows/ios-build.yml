name: FINAL-SMART-SUCCESS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Install ALL Certificates (Dev + Dist)
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 21)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 1. Устанавливаем DISTRIBUTION (для магазина)
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > dist.p12
          security import dist.p12 -k "$KEYCHAIN_PATH" -P "${{ secrets.P12_PASSWORD }}" -A -T /usr/bin/codesign

          # 2. Устанавливаем DEVELOPMENT (чтобы Xcode не ворчал)
          echo "${{ secrets.DEV_P12_BASE64 }}" | base64 --decode > dev.p12
          security import dev.p12 -k "$KEYCHAIN_PATH" -P "${{ secrets.P12_PASSWORD }}" -A -T /usr/bin/codesign
          
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          # Устанавливаем ОБА профиля
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/dist.mobileprovision
          echo "${{ secrets.DEV_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/dev.mobileprovision
          
          # Вытаскиваем UUID профиля Распространения (для бантика)
          DIST_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/dist.mobileprovision))
          echo "DIST_UUID=$DIST_UUID" >> $GITHUB_ENV

      - name: 3. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: 4. Prepare Smart Project
        run: |
          flutter pub get
          rm -rf ios/Runner.xcodeproj
          PROJECT_NAME=$(grep '^name:' pubspec.yaml | awk '{print $2}')
          flutter create . --platforms ios --org com.nataliia --project-name $PROJECT_NAME
          
          # Прописываем Team ID и разрешаем автоматический выбор между Dev и Dist
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = "PCSW3AKAPF";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/embed_and_thin//g' ios/Runner.xcodeproj/project.pbxproj

      - name: 5. Build Official IPA
        run: |
          # Собираем IPA, указывая конкретный профиль для экспорта
          flutter build ipa --release --export-method app-store

      - name: 6. Save IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_READY_FOR_APPLE
          path: build/ios/ipa/*.ipa
