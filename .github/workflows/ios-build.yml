name: DIAGNOSTIC-MODE-FOR-KOTIK

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: macos-15
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: 3. ДОПРОС КОТИКА (ДИАГНОСТИКА)
        run: |
          echo "--- 🛠 ОТЧЕТ ДИАГНОСТИКИ ДЛЯ НАТАЛЬИ ---"
          
          echo "📍 ГДЕ Я НАХОЖУСЬ (PWD):"
          pwd
          
          echo "📍 ПУТЬ К FLUTTER В СИСТЕМЕ (FLUTTER_HOME):"
          echo $FLUTTER_HOME
          
          echo "🔎 ПРОВЕРКА ФАЙЛА Generated.xcconfig (ЧТО ТАМ НАПИСАНО):"
          if [ -f "ios/Flutter/Generated.xcconfig" ]; then
            cat ios/Flutter/Generated.xcconfig
          else
            echo "❌ ФАЙЛ Generated.xcconfig НЕ НАЙДЕН ПО ПУТИ ios/Flutter/"
          fi
          
          echo "🔎 ПРОВЕРКА ФАЙЛА Podfile (НАЧАЛЬНЫЕ СТРОКИ):"
          head -n 20 ios/Podfile
          
          echo "🔎 ПОИСК ФАЙЛА podhelper.rb (ГДЕ ОН ПРЯЧЕТСЯ):"
          find $FLUTTER_HOME -name "podhelper" || echo "Не могу найти podhelper даже в папке Flutter"

      - name: 4. ПОПЫТКА СБОРКИ (ДЛЯ ПРОВЕРКИ ОШИБКИ)
        run: |
          flutter pub get
          export FLUTTER_ROOT=$FLUTTER_HOME
          cd ios
          pod install --repo-update || echo "❌ СБОРКА УПАЛА, КАК И ОЖИДАЛОСЬ. СМОТРИ ОТЧЕТ ВЫШЕ."
