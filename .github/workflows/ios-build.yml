name: SMART-BODY-LIFE-TOTAL-SUCCESS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 1.1 Switch to Xcode 26 (iOS 26 SDK)
        run: |
          # Автоматический поиск Xcode 26 на macOS 15
          XCODE_PATH=$(ls -d /Applications/Xcode_26* 2>/dev/null | head -n 1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "✅ Использую Xcode здесь: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: 2. Setup Flutter 3.13.9
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          architecture: arm64

      - name: 3. Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: 4. Import Certs
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 5. Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/f2e7364b-98c7-44ad-a0dc-84acd2d0fd80.mobileprovision

      - name: 6. Fix Project Settings (Universal Search)
        run: |
          # Находим файл проекта, даже если пути изменились
          PBXPROJ_PATH=$(find . -name "project.pbxproj" -print | head -n 1)
          if [ -n "$PBXPROJ_PATH" ]; then
            echo "✅ Нашел проект: $PBXPROJ_PATH"
            sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = PCSW3AKAPF;/g' "$PBXPROJ_PATH"
          fi
          flutter clean
          flutter pub get

      - name: 7. Guaranteed Signature Build (iOS 26 SDK)
        run: |
          # Сборка с использованием SDK 26, как требует Apple 2026
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --build-number=16
          
          # Финальная подпись манифеста проверенным ID B66D675A
          FLUTTER_FRAMEWORK=$(find build/ios/archive -name "Flutter.framework" -type d | head -n 1)
          if [ -n "$FLUTTER_FRAMEWORK" ]; then
            cp ios/Runner/PrivacyInfo.xcprivacy "$FLUTTER_FRAMEWORK/PrivacyInfo.xcprivacy"
            /usr/bin/codesign --force --sign "B66D675A50697F0A07762DEA2FD5436BCA702AA4" --deep --timestamp=none "$FLUTTER_FRAMEWORK"
            /usr/bin/codesign --verify --verbose "$FLUTTER_FRAMEWORK"
          fi

      - name: 8. Upload READY IPA
        uses: actions/upload-artifact@v4
        with:
          name: smart-body-life-READY-IPA
          path: build/ios/ipa/*.ipa
