name: D-PREPARE-FILES

on:
  workflow_dispatch:

jobs:
  prepare:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. Create Generated.xcconfig
        run: |
          flutter pub get
          flutter build ios --config-only --release
          if [ -f ios/Flutter/Generated.xcconfig ]; then 
            echo "SUCCESS: File created."
            head -n 5 ios/Flutter/Generated.xcconfig
          else 
            echo "ERROR: File NOT found!"
          fi

      - name: 4. Check Secrets
        env:
          P12: ${{ secrets.P12_BASE64 }}
          PROF: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$P12" ]; then echo "P12_BASE64: EMPTY"; else echo "P12_BASE64: OK"; fi
          if [ -z "$PROF" ]; then echo "PROVISIONING_PROFILE_BASE64: EMPTY"; else echo "PROVISIONING_PROFILE_BASE64: OK"; fi
