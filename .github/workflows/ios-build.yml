name: GitHub Secrets Audit
on: [push, workflow_dispatch]

jobs:
  check-secrets:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Internal Audit of Secrets
        run: |
          echo "=== STEP 1: CHECKING BUNDLE ID IN CODE ==="
          grep -r "PRODUCT_BUNDLE_IDENTIFIER" . || echo "Not found in root"
          
          echo "=== STEP 2: CHECKING SECRET PRESENCE ==="
          if [ -z "${{ secrets.P12_BASE64 }}" ]; then echo "❌ P12_BASE64 is EMPTY"; else echo "✅ P12_BASE64 is PRESENT"; fi
          if [ -z "${{ secrets.P12_PASSWORD }}" ]; then echo "❌ P12_PASSWORD is EMPTY"; else echo "✅ P12_PASSWORD is PRESENT"; fi
          if [ -z "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" ]; then echo "❌ PROFILE is EMPTY"; else echo "✅ PROFILE is PRESENT"; fi

          echo "=== STEP 3: TRYING TO DECODE P12 (PASSPORT) ==="
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > test_cert.p12 && echo "✅ P12 Decoded Successfully" || echo "❌ ERROR: Cannot decode P12_BASE64"

          echo "=== STEP 4: TRYING TO DECODE PROFILE (VISA) ==="
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > test.mobileprovision && echo "✅ Profile Decoded Successfully" || echo "❌ ERROR: Cannot decode PROFILE"
