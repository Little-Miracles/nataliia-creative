- name: 5. СБОРКА С ЧИСТЫМИ ПУТЯМИ
        run: |
          # Создаем ExportOptions
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>PCSW3AKAPF</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.nataliia.smartbodylife</key>
              <string>f2e7364b-98c7-44ad-a0dc-84acd2d0fd80</string>
            </dict>
            <key>signingStyle</key><string>manual</string>
          </dict>
          </plist>
          EOF

          # 1. ТОТАЛЬНОЕ ЗАБЫВАНИЕ СТАРЫХ ПУТЕЙ
          export FLUTTER_ROOT=$FLUTTER_HOME
          flutter clean
          
          # 2. СОЗДАЕМ НОВУЮ "МАСТЕРСКУЮ" С НУЛЯ
          # Эта команда создаст файлы ИМЕННО там, где мы сейчас находимся
          flutter build ios --release --no-codesign --dart-define-from-file=.env

          # 3. СБОРКА IPA С ЖЕСТКОЙ ПРИВЯЗКОЙ К НОВОЙ ПАПКЕ
          # Мы явно говорим: "Не смотри по сторонам, бери всё из build/ios/iphoneos"
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define-from-file=.env \
            --build-name=3.0.0 \
            --build-number=18 \
            --verbose
