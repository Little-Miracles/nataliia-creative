name: KEYCHAIN-REVISION-REPORT

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Open Safes and Report
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > test_cert.p12
          if [ -s test_cert.p12 ]; then
            echo "STATUS_P12: FOUND"
            file test_cert.p12
          else
            echo "STATUS_P12: EMPTY_OR_ERROR"
          fi

          PASS=$(echo "${{ secrets.P12_PASSWORD }}" | xargs)
          if [ -z "$PASS" ]; then
            echo "STATUS_PASS: EMPTY"
          else
            echo "STATUS_PASS: OK"
          fi

          KEYCHAIN_PATH=$RUNNER_TEMP/test.keychain
          security create-keychain -p "123" "$KEYCHAIN_PATH"
          
          if security import test_cert.p12 -k "$KEYCHAIN_PATH" -P "$PASS" -A -T /usr/bin/codesign; then
            echo "STATUS_AUTH: SUCCESS_MATCH"
          else
            echo "STATUS_AUTH: PASSWORD_MISMATCH_OR_MAC_FAIL"
          fi

          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > test.mobileprovision
          if [ -s test.mobileprovision ]; then
            echo "STATUS_PROV: FOUND"
            grep -a "TeamIdentifier" test.mobileprovision || true
          else
            echo "STATUS_PROV: EMPTY"
          fi
