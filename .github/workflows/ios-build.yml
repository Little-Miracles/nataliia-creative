name: SMART-BODY-LIFE-DIAGNOSTIC

on:
  workflow_dispatch:

jobs:
  check-map:
    runs-on: macos-15
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Reveal all folders
        run: |
          # Котик просто выпишет список всех папок, которые он скачал
          echo "Current directory contents:"
          ls -F
          
          # Мы проверяем регистр: ios или iOS?
          echo "Checking specifically for ios directory:"
          find . -maxdepth 2 -name "ios" -o -name "iOS"
          
      - name: 3. Search for the missing file
        run: |
          # Ищем Runner.xcodeproj по всей карте проекта
          echo "Searching for Runner.xcodeproj..."
          find . -name "Runner.xcodeproj"
