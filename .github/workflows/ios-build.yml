name: SMART-BODY-LIFE-FINAL-BUILD

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Flutter 3.13.9
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          architecture: arm64

      - name: 3. Create .env from Secret
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "Ключ для распознавания еды успешно добавлен"

      - name: 4. Clear and Get Packages
        run: |
          flutter clean
          flutter pub get

      - name: 5. Build iOS
        run: |
          flutter build ios --release --no-codesign --tree-shake-icons

      - name: 6. Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-body-life-ios-release
          path: build/ios/iphoneos/Runner.app
          retention-days: 10    
