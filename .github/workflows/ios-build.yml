name: I-REGENERATE-SUCCESS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. Update Project Structure
        run: |
          flutter pub get
          # Эта команда обновит файлы проекта, чтобы они не конфликтовали
          flutter create . --platforms ios
          # Повторно создаем инструкцию после обновления
          flutter build ios --config-only --release

      - name: 4. Build Mobile App
        run: |
          flutter build ipa --release --no-codesign
        env:
          CERT_DATA: ${{ secrets.P12_BASE64 }}
          PROF_DATA: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}

      - name: 5. Save Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_Final_I
          path: build/ios/archive/Runner.xcarchive
