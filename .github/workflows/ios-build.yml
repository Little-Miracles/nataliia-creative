name: DEBUG-VERSION-HUNT

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: macos-14
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'

      - name: 3. ДОПРОС КОТИКА (Проверка всех файлов)
        run: |
          echo "=== ПРОВЕРКА PUBSPEC.YAML ==="
          grep "version:" pubspec.yaml
          
          echo "=== ПРОВЕРКА PROJECT.PBXPROJ ==="
          grep "CURRENT_PROJECT_VERSION" ios/Runner.xcodeproj/project.pbxproj
          grep "MARKETING_VERSION" ios/Runner.xcodeproj/project.pbxproj
          
          echo "=== ПРОВЕРКА INFO.PLIST ==="
          grep -A 1 "CFBundleVersion" ios/Runner/Info.plist
          grep -A 1 "CFBundleShortVersionString" ios/Runner/Info.plist
          
          echo "=== ПРОВЕРКА НАСТРОЕК FLUTTER ==="
          if [ -f ios/Flutter/Generated.xcconfig ]; then
            grep "FLUTTER_BUILD" ios/Flutter/Generated.xcconfig
          else
            echo "Файл Generated.xcconfig еще не создан"
          fi
