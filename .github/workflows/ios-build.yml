name: SMART-BODY-DIAGNOSTIC-MODE

on:
  workflow_dispatch:

jobs:
  diagnostic:
    runs-on: macos-15
    steps:
      - name: 1. Получение кода
        uses: actions/checkout@v4

      - name: 2. Настройка Flutter (3.29.0)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: 3. ПОЛНАЯ ДИАГНОСТИКА СИСТЕМЫ
        run: |
          echo "=== ПРОВЕРКА FLUTTER DOCTOR ==="
          flutter doctor -v
          
          echo "=== ПРОВЕРКА ПЕРЕМЕННЫХ ОКРУЖЕНИЯ ==="
          export
          
          echo "=== ПРОВЕРКА ПУТЕЙ К SDK ==="
          which flutter
          flutter --version
          
          echo "=== ПРОВЕРКА ПРОЕКТА (IOS) ==="
          cd ios
          # Этот флаг заставит Xcode выдать полный список настроек, которые он видит
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -showBuildSettings
          cd ..

      - name: 4. АНАЛИЗ ЗАВИСИМОСТЕЙ
        run: |
          flutter pub get
          flutter pub outdated
