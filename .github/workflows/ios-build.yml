name: iOS Build SmartBody Life

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Prepare Identity
        run: |
          # Наталья, здесь мы подтверждаем ваше имя официально
          flutter create . --platforms ios --org com.nataliia --project-name smart_body_life
          flutter pub get

      - name: Build IPA
        env:
          # Проверяем секреты прямо во время сборки
          CERT_BASE64: ${{ secrets.IOS_CERTIFICATE }}
        run: |
          # Собираем архив без подписи, чтобы Котик не капризничал
          flutter build ipa --release --no-codesign

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_Life_App
          path: build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app
