name: Z-IPA-SUCCESS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. The Miracle Fix
        run: |
          flutter pub get
          # Сносим старое, создаем новое — этот метод сработал!
          rm -rf ios/Runner.xcodeproj
          rm -rf ios/Runner.xcworkspace
          PROJECT_NAME=$(grep '^name:' pubspec.yaml | awk '{print $2}')
          flutter create . --platforms ios --org com.nataliia --project-name $PROJECT_NAME
          
          # Убираем занозу 237 из нового файла
          sed -i '' 's/embed_and_thin//g' ios/Runner.xcodeproj/project.pbxproj
          
          # Настраиваем конфигурацию
          flutter build ios --config-only --release

      - name: 4. Build IPA Archive
        run: |
          # Теперь собираем именно архив без подписи (IPA)
          flutter build ipa --release --no-codesign
        env:
          CERT_DATA: ${{ secrets.P12_BASE64 }}
          PROF_DATA: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}

      - name: 5. Save Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_IPA_Final
          path: build/ios/archive/Runner.xcarchive
