name: FINAL-GET-RESULT

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. Radical Fix (Proven)
        run: |
          flutter pub get
          rm -rf ios/Runner.xcodeproj
          rm -rf ios/Runner.xcworkspace
          PROJECT_NAME=$(grep '^name:' pubspec.yaml | awk '{print $2}')
          flutter create . --platforms ios --org com.nataliia --project-name $PROJECT_NAME
          sed -i '' 's/embed_and_thin//g' ios/Runner.xcodeproj/project.pbxproj
          # Прописываем твой ID еще раз, на всякий случай
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = "PCSW3AKAPF";/g' ios/Runner.xcodeproj/project.pbxproj

      - name: 4. Just Archive
        # Мы используем команду ios вместо ipa, она менее капризная к сертификатам в конце
        run: |
          flutter build ios --release --no-codesign --no-version-check
        continue-on-error: true

      - name: 5. Force Export Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_Final_Collection
          # Мы забираем ВСЁ, что он успел собрать в папке сборки
          path: build/ios/iphoneos/
