name: SMART-BODY-LIFE-TOTAL-SIGNED-BUILD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Flutter 3.13.9
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          architecture: arm64

      - name: 3. Create .env from Secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: 4. Import Apple Certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 5. Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: 6. Get Packages
        run: |
          flutter clean
          flutter pub get

      - name: 7. Build Signed IPA
        run: |
          # Собираем полноценный файл для Apple
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: 8. Save Signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: smart-body-life-ready-to-apple
          path: build/ios/ipa/*.ipa
          retention-days: 10
