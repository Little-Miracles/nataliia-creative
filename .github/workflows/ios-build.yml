name: SMART-BODY-LIFE-TOTAL-CLEAN-BUILD

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - name: 1. Checkout fresh code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          architecture: arm64

      - name: 3. Flutter deep clean
        run: |
          flutter clean
          flutter pub get

      - name: 4. Reset CocoaPods and Xcode cache
        run: |
          cd ios
          rm -rf Pods
          rm -rf build
          rm -f Podfile.lock
          pod cache clean --all
          pod install
          cd ..

      - name: 5. Create .env from Secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: 6. Build iOS release
        run: |
          flutter build ios --release --no-codesign --verbose
