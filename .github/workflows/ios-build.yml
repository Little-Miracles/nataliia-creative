name: SMART-BODY-LIFE-TOTAL-VICTORY

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. ЗАГРУЗКА КОДА
        uses: actions/checkout@v4

      - name: 2. Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: 3. FLUTTER 3.29.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: 4. АВТО-ИСПРАВЛЕНИЕ КОДА (Health)
        run: |
          sed -i '' 's/HealthFactory/Health/g' lib/screens/evolution_session_screen.dart

      - name: 5. КЛЮЧИ И ENV
        run: |
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/f2e7364b-98c7-44ad-a0dc-84acd2d0fd80.mobileprovision
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: 6. ЖЕСТКАЯ НАСТРОЙКА ПУТЕЙ (ЛЕЧИМ NULL CHECK)
        run: |
          flutter config --no-analytics
          flutter pub get
          
          # ПРИНУДИТЕЛЬНО ПРОПИСЫВАЕМ ПУТИ ДЛЯ XCODE-BACKEND
          mkdir -p ios/Flutter
          echo "FLUTTER_ROOT=$FLUTTER_ROOT" > ios/Flutter/Generated.xcconfig
          echo "FLUTTER_APPLICATION_PATH=$GITHUB_WORKSPACE" >> ios/Flutter/Generated.xcconfig
          echo "FLUTTER_TARGET=lib/main.dart" >> ios/Flutter/Generated.xcconfig
          echo "ASSET_PREFIX=" >> ios/Flutter/Generated.xcconfig
          echo "TRACK_WIDGET_CREATION=false" >> ios/Flutter/Generated.xcconfig
          echo "PACKAGE_CONFIG=.dart_tool/package_config.json" >> ios/Flutter/Generated.xcconfig
          
          # Синхронизируем это с основным проектом
          cp ios/Flutter/Generated.xcconfig ios/Flutter/flutter_export_environment.sh
          sed -i '' 's/=/: /g' ios/Flutter/flutter_export_environment.sh
          
          cd ios
          rm -rf Pods
          rm -f Podfile.lock
          pod install --repo-update
          cd ..

      - name: 7. СБОРКА IPA
        run: |
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>PCSW3AKAPF</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.nataliia.smartbodylife</key>
              <string>f2e7364b-98c7-44ad-a0dc-84acd2d0fd80</string>
            </dict>
            <key>signingStyle</key><string>manual</string>
          </dict>
          </plist>
          EOF

          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define-from-file=.env
