name: SMART-BODY-LIFE-INDUSTRIAL-BUILD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. Получение кода
        uses: actions/checkout@v4

      - name: 2. Настройка Flutter (3.29.0)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: 3. Подготовка сертификатов (Ваша подпись)
        run: |
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/f2e7364b-98c7-44ad-a0dc-84acd2d0fd80.mobileprovision
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: 4. Установка зависимостей
        run: |
          flutter pub get
          cd ios
          # Передаем путь к Flutter для CocoaPods явно
          export FLUTTER_ROOT=$FLUTTER_HOME
          pod install --repo-update
          cd ..

      - name: 5. ПРЯМАЯ СБОРКА АРХИВА (Обход ошибки 220)
        run: |
          # 1. Готовим iOS проект (без подписи на этом этапе)
          flutter build ios --release --no-codesign --dart-define-from-file=.env

          # 2. Собираем АРХИВ через Xcode напрямую. 
          # Мы ВРУЧНУЮ вписываем переменные, которые "Котик" терял.
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/Runner.xcarchive \
            FLUTTER_ROOT=$FLUTTER_HOME \
            FLUTTER_BUILD_MODE=release \
            archive

      - name: 6. ЭКСПОРТ ПОДПИСАННОГО IPA
        run: |
          # Создаем файл настроек экспорта (с вашей подписью)
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>PCSW3AKAPF</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.nataliia.smartbodylife</key>
              <string>f2e7364b-98c7-44ad-a0dc-84acd2d0fd80</string>
            </dict>
            <key>signingStyle</key><string>manual</string>
          </dict>
          </plist>
          EOF

          # Превращаем архив в готовый IPA с подписью
          xcodebuild -exportArchive \
            -archivePath ios/build/Runner.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/ios/ipa

      - name: 7. Сохранение результата
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: smart-body-life-ipa
          path: build/ios/ipa/*.ipa
