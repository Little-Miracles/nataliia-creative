name: iOS Secrets Audit 2026

on:
  workflow_dispatch:

jobs:
  audit-secrets:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Secrets Integrity
        env:
          CERT_DATA: ${{ secrets.IOS_CERTIFICATE }}
          PROF_DATA: ${{ secrets.IOS_PROVISION_PROFILE }}
        run: |
          echo "=== IOS_CERTIFICATE CHECK ==="
          if [ -z "$CERT_DATA" ]; then 
            echo "RESULT: EMPTY (Secret not found)"
          else 
            echo "STRING LENGTH: ${#CERT_DATA} characters"
            if echo "$CERT_DATA" | base64 --decode > /dev/null 2>&1; then
              echo "VALIDATION: Base64 format is CORRECT"
            else
              echo "VALIDATION: ERROR - Invalid Base64 or corrupted data"
            fi
          fi
          
          echo ""
          echo "=== IOS_PROVISION_PROFILE CHECK ==="
          if [ -z "$PROF_DATA" ]; then 
            echo "RESULT: EMPTY"
          else 
            echo "STRING LENGTH: ${#PROF_DATA} characters"
            if echo "$PROF_DATA" | base64 --decode > /dev/null 2>&1; then
              echo "VALIDATION: Base64 format is CORRECT"
            else
              echo "VALIDATION: ERROR - Invalid Base64"
            fi
          fi
