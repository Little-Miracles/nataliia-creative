name: SmartBody-Project-Audit

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Project File Audit
        run: |
          echo "=== CHECKING PROJECT FILES ==="
          ls -R ios/*.xcodeproj
          echo ""
          echo "=== CHECKING BUNDLE ID AND TEAM ==="
          grep -R "PRODUCT_BUNDLE_IDENTIFIER" ios/Runner.xcodeproj/project.pbxproj | head -n 5
          grep -R "DEVELOPMENT_TEAM" ios/Runner.xcodeproj/project.pbxproj | head -n 5

      - name: 3. Secrets Format Audit
        env:
          CERT: ${{ secrets.IOS_CERTIFICATE }}
          PROF: ${{ secrets.IOS_PROVISION_PROFILE }}
        run: |
          echo "=== CHECKING SECRETS STORAGE ==="
          if [ -z "$CERT" ]; then echo "CERT: NOT FOUND IN GITHUB SECRETS"; else echo "CERT: EXISTS (${#CERT} chars)"; fi
          if [ -z "$PROF" ]; then echo "PROF: NOT FOUND IN GITHUB SECRETS"; else echo "PROF: EXISTS (${#PROF} chars)"; fi
          
      - name: 4. Xcode Internal Paths
        run: |
          echo "=== CHECKING FLUTTER CONFIGS ==="
          if [ -f ios/Flutter/Generated.xcconfig ]; then echo "Generated.xcconfig: FOUND"; else echo "Generated.xcconfig: MISSING"; fi
