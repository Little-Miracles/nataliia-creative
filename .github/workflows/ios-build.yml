name: SmartBody Final Locked Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Tools
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Official Project Setup
        run: |
          flutter create . --platforms ios --org com.nataliia --project-name smart_body_life
          flutter pub get

      - name: Hard-Lock Device Identity
        run: |
          mkdir -p ios/Flutter
          echo "FLUTTER_TARGET_DEVICE_ID=generic" > ios/Flutter/Generated.xcconfig
          echo "TARGET_DEVICE_IDENTIFIER=generic" >> ios/Flutter/Generated.xcconfig
          echo "FLUTTER_BUILD_MODE=release" >> ios/Flutter/Generated.xcconfig
          chmod 444 ios/Flutter/Generated.xcconfig

      - name: Official Apple Assembly
        run: |
          flutter build ipa --release --no-codesign
          
          cd build/ios/archive/Runner.xcarchive/Products/Applications
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../../../SmartBody_Life_V2026.ipa Payload
            
      - name: Deliver Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smartbody-official-package
          path: SmartBody_Life_V2026.ipa
          
