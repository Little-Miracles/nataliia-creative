name: SMART-BODY-LIFE-TOTAL-SUCCESS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 1.1 Force Xcode 26 (Apple Requirement 2026)
        run: |
          # Ищем Xcode 26 в списке доступных и переключаемся на него
          AVAILABLE_XCODE=$(ls /Applications | grep "Xcode_26" | head -n 1)
          if [ -z "$AVAILABLE_XCODE" ]; then
            echo "Xcode 26 NOT FOUND on this runner. Trying latest available..."
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          else
            echo "Found $AVAILABLE_XCODE. Switching..."
            sudo xcode-select -s /Applications/$AVAILABLE_XCODE/Contents/Developer
          fi
          xcodebuild -version

      - name: 2. Setup Flutter 3.13.9
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          architecture: arm64

      - name: 3. Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: 4. Import Distribution Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 5. Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # Ставим профиль под его реальным именем
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/SMART_DISTRIBUTION.mobileprovision
          # Создаем копию с UUID для ExportOptions
          cp ~/Library/MobileDevice/Provisioning\ Profiles/SMART_DISTRIBUTION.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/f2e7364b-98c7-44ad-a0dc-84acd2d0fd80.mobileprovision

      - name: 6. Prepare Project
        run: |
          flutter clean
          flutter pub get
          
          # 1. Основной манифест в папку ресурсов
          mkdir -p ios/Runner/Resources
          cp ios/Runner/PrivacyInfo.xcprivacy ios/Runner/Resources/PrivacyInfo.xcprivacy
          
          # 2. Манифест для Flutter Framework
          mkdir -p ios/Flutter/Flutter.framework
          cp ios/Runner/PrivacyInfo.xcprivacy ios/Flutter/Flutter.framework/PrivacyInfo.xcprivacy
          
          # 3. Манифесты для сторонних SDK (создаем пустые структуры для копирования)
          # Это гарантирует, что при сборке Xcode подхватит их
          for plugin in device_info_plus url_launcher_ios video_player_avfoundation; do
            mkdir -p "ios/Pods/$plugin/Resources"
            cp ios/Runner/PrivacyInfo.xcprivacy "ios/Pods/$plugin/Resources/PrivacyInfo.xcprivacy"
          done

      - name: 7. Build Sealed IPA
        run: |
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist --build-number=7

      - name: 8. Give Me the Sealed Box
        uses: actions/upload-artifact@v4
        with:
          name: smart-body-life-READY-IPA
          path: build/ios/ipa/*.ipa
          retention-days: 10
