name: iOS Build Audit
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Run Version Audit
        run: |
          echo "CHECKING INSTALLED EQUIPMENT..."
          flutter --version
          
          echo "CHECKING PROJECT REQUIREMENTS..."
          # Эта команда заставит Котика сравнить ваш проект со своим складом
          flutter pub outdated
          
          echo "TESTING COMPATIBILITY..."
          # А эта команда покажет, могут ли все детали работать вместе
          flutter pub get
