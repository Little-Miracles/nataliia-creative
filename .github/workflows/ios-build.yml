name: iOS Logic Assembly 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Modern Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Sync Instructions with New Version
        run: |
          # Step 1: Tell Flutter to update iOS templates to version 3.24
          flutter create . --platforms ios
          
          # Step 2: Ensure the work order uses the generic device standard
          mkdir -p ios/Flutter
          echo "FLUTTER_TARGET_DEVICE_ID=generic" >> ios/Flutter/Generated.xcconfig
          echo "TARGET_DEVICE_IDENTIFIER=generic" >> ios/Flutter/Generated.xcconfig

      - name: Production Assembly
        run: |
          flutter pub get
          # Building the final product using the updated industrial standard
          flutter build ipa --release --no-codesign
          
          # Packaging the result
          cd build/ios/archive/Runner.xcarchive/Products/Applications
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../../../SmartBody_V2026_Final.ipa Payload
            
      - name: Deliver Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smartbody-v2026
          path: SmartBody_V2026_Final.ipa
