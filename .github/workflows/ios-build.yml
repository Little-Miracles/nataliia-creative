name: iOS Diagnostic and Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Setup Certificates and Keychain
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > cert.p12
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Diagnostic Audit
        run: |
          echo "--- CHECKING IDENTITIES ---"
          security find-identity -v -p codesigning build.keychain
          echo "--- CHECKING PROFILES ---"
          ls ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "--- FLUTTER DOCTOR ---"
          flutter doctor -v

      - name: Build IPA
        run: |
          flutter pub get
          # Собираем проект. Если есть сертификаты, он их подцепит сам.
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
            
      - name: Upload Logs and IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: |
            build/ios/ipa/*.ipa
            build/ios/archive/*.xcarchive
