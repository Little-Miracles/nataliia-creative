name: SMART-BODY-LIFE-FINAL-TRIUMPH

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. Install Certificates
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 21)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > dist.p12
          PASS=$(echo "${{ secrets.P12_PASSWORD }}" | xargs)
          security import dist.p12 -k "$KEYCHAIN_PATH" -P "$PASS" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/dist.mobileprovision
          DIST_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/dist.mobileprovision))
          cp ~/Library/MobileDevice/Provisioning\ Profiles/dist.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$DIST_UUID.mobileprovision

      - name: 4. Prepare Project Dependencies
        run: |
          # Мы доверяем вашим ручным правкам на GitHub
          flutter pub get

      - name: 5. Build iOS Archive
        run: |
          # Теперь Котик просто берет проект и пытается его упаковать
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -archivePath build/ios/archive/Runner.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO || true

      - name: 6. Deliver Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBodyLife_Package
          path: |
            **/*.app
            **/*.xcarchive
          if-no-files-found: warn
          retention-days: 5
