name: iOS Master Technical Audit
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: System Audit Execution
        run: |
          # 1. Просим Котика перечислить все файлы, где могут быть инструкции
          echo "FILE_LISTING_START"
          find ios -maxdepth 3 -name "*.xcconfig" -o -name "project.pbxproj"
          echo "FILE_LISTING_END"
          
          # 2. Просим его выписать из этих файлов все строки про архитектуру и устройство
          echo "SEARCHING_OLD_INSTRUCTIONS"
          grep -rnE "ARCHS|ONLY_ACTIVE_ARCH|SDKROOT|TARGET_DEVICE_IDENTIFIER|IPHONEOS_DEPLOYMENT_TARGET" ios/ || true
          
          # 3. Просим его показать нам ту самую "больную" строку 237 в его собственных мозгах
          echo "INSPECTING_FLUTTER_TOOL_LOGIC"
          grep -nC 5 "TARGET_DEVICE_IDENTIFIER" $FLUTTER_ROOT/packages/flutter_tools/bin/xcode_backend.dart || true
