name: SMART-BODY-LIFE-IOS26-FIX

on:
  workflow_dispatch:

jobs:
  build:
    # МЫ МЕНЯЕМ СИСТЕМУ НА САМУЮ НОВУЮ (iOS 26 SDK+)
    runs-on: macos-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Настройка Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'

      - name: 3. Ключи и Профиль (Distribution)
        run: |
          security create-keychain -p "build_pass" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build_pass" build.keychain
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > release.p12
          security import release.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build_pass" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/f2e7364b-98c7-44ad-a0dc-84acd2d0fd80.mobileprovision
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: 4. Подготовка кода
        run: |
          flutter pub get
          cd ios && pod install --repo-update && cd ..

      - name: 5. СБОРКА IPA (Требование Apple SDK 26+)
        run: |
          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>PCSW3AKAPF</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.nataliia.smartbodylife</key>
              <string>f2e7364b-98c7-44ad-a0dc-84acd2d0fd80</string>
            </dict>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
          </dict>
          </plist>
          EOF

          # Собираем с использованием новейшего SDK
          flutter build ipa --release \
            --export-options-plist=ExportOptions.plist \
            --dart-define-from-file=.env \
            --build-name=3.0.0 \
            --build-number=18

      - name: 6. ЗАБИРАЕМ ГОТОВЫЙ ФАЙЛ
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SMART-BODY-LIFE-SDK26-READY
          path: build/ios/ipa/*.ipa
