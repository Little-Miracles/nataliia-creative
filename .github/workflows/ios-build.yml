name: SMART-BODY-LIFE-FINAL-TRIUMPH

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. Install Certificates
        run: |
          # Ваши документы и сертификаты — Котик обязан их использовать
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/dist.mobileprovision

      - name: 4. Prepare Project
        run: |
          # Мы заставляем Котика увидеть ваш pubspec.yaml и скачать библиотеки
          flutter pub get

      - name: 5. Standard Build
        run: |
          # Мы НЕ отключаем ничего. Мы говорим: собирай iOS как положено.
          # Если папка на месте (а она на месте!), он её увидит.
          flutter build ios --release --no-codesign

      - name: 6. Deliver Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBodyLife_iOS_App
          path: build/ios/iphoneos/*.app
          retention-days: 5
