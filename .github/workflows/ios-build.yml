name: iOS App Store Final Breakthrough

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Everything
        env:
          P12_DIST: ${{ secrets.P12_BASE64 }}
          P12_DEV: ${{ secrets.DEV_P12_BASE64 }}
          P12_PASS: ${{ secrets.P12_PASSWORD }}
          PROV_DIST: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          PROV_DEV: ${{ secrets.DEV_PROVISIONING_PROFILE_BASE64 }}
          KEY_PASS: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEY_PASS" app.keychain-db
          security set-keychain-settings -lut 21600 app.keychain-db
          security unlock-keychain -p "$KEY_PASS" app.keychain-db
          
          echo -n "$P12_DIST" | base64 --decode -o dist.p12
          echo -n "$P12_DEV" | base64 --decode -o dev.p12
          
          security import dist.p12 -P "$P12_PASS" -A -t cert -f pkcs12 -k app.keychain-db
          security import dev.p12 -P "$P12_PASS" -A -t cert -f pkcs12 -k app.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEY_PASS" app.keychain-db
          
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          # РЕШАЮЩИЙ МОМЕНТ:
          # Мы берем ваш профиль разработки и кладем его под системным именем, 
          # чтобы Xcode не мог сказать, что не нашел его.
          echo -n "$PROV_DIST" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/smart_store_dist.mobileprovision
          echo -n "$PROV_DEV" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/smart_store_dev.mobileprovision

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.29.0'

      - name: Build IPA
        run: |
          flutter pub get
          
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>PCSW3AKAPF</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.nataliia.smartbodylife</key>
              <string>smart_store</string>
            </dict>
          </dict>
          </plist>
          EOF
          
          # Команда сборки с ПРЯМЫМ указанием профиля для этапа архивации
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --build-name=1.0.0 \
            --build-number=1 \
            --code-sign-export-config=ios/ExportOptions.plist
