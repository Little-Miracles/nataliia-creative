name: SMART-BODY-LIFE-AUDIT-ONLY

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: macos-15
    steps:
      - name: 1. Загрузка проекта
        uses: actions/checkout@v4

      - name: 2. Настройка среды Flutter (3.29.0)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: 3. Подготовка (pub get)
        run: flutter pub get

      - name: 4. ЧЕСТНЫЙ АУДИТ И ИНСТРУКЦИИ
        run: |
          echo "--- НАЧИНАЕМ ПРОВЕРКУ АНКЕТЫ ПРИЛОЖЕНИЯ ---"
          
          # Генерируем временные настройки, чтобы увидеть, что создаст сам Flutter
          flutter build ios --config-only --release --no-codesign > /dev/null 2>&1
          
          echo "--- РЕЗУЛЬТАТЫ ПРОВЕРКИ ---"

          # Проверка FLUTTER_ROOT
          if ! grep -q "FLUTTER_ROOT" ios/Flutter/Generated.xcconfig; then
            echo "❌ ОШИБКА: Поле 'FLUTTER_ROOT' не заполнено."
            echo "👉 ЧТО СДЕЛАТЬ: Откройте файл 'ios/Flutter/Generated.xcconfig' и добавьте туда строку:"
            echo "   FLUTTER_ROOT=$FLUTTER_HOME"
          else
            echo "✅ FLUTTER_ROOT на месте."
          fi

          # Проверка FLUTTER_FRAMEWORK_DIR
          if ! grep -q "FLUTTER_FRAMEWORK_DIR" ios/Flutter/Generated.xcconfig; then
            echo "❌ ОШИБКА: Поле 'FLUTTER_FRAMEWORK_DIR' (путь к фреймворкам) отсутствует."
            echo "👉 ЧТО СДЕЛАТЬ: Добавьте в файл 'ios/Flutter/Generated.xcconfig' следующую строку:"
            echo "   FLUTTER_FRAMEWORK_DIR=$FLUTTER_HOME/bin/cache/artifacts/engine/ios-release"
          else
            echo "✅ FLUTTER_FRAMEWORK_DIR на месте."
          fi

          # Проверка основного файла проекта на DEVELOPMENT_TEAM
          TEAM_ID=$(grep "DEVELOPMENT_TEAM" ios/Runner.xcodeproj/project.pbxproj | head -1 | cut -d'=' -f2 | tr -d ' ;')
          if [ "$TEAM_ID" != "PCSW3AKAPF" ]; then
            echo "❌ ОШИБКА: Указана неверная Команда (DEVELOPMENT_TEAM)."
            echo "👉 ЧТО СДЕЛАТЬ: В файле 'ios/Runner.xcodeproj/project.pbxproj' замените старый ID на: PCSW3AKAPF"
          else
            echo "✅ DEVELOPMENT_TEAM указан верно (PCSW3AKAPF)."
          fi

          echo "---"
          echo "Наталья, Котик закончил проверку. Если выше есть пункты с '❌', значит, "
          echo "причина остановки именно в них. Внесите эти данные в файлы вашего проекта,"
          echo "и тогда 'дверь' для сборки откроется сама собой."
