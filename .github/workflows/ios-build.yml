name: iOS Absolute Concept Redirection
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Deep Concept Redirection
        run: |
          # 1. Подменяем понятия в основном коде
          find $FLUTTER_ROOT -name "*.dart" -exec sed -i '' 's/buildSettings\["TARGET_DEVICE_IDENTIFIER"\]/ "GenericDevice" /g' {} +
          
          # 2. Усмиряем упрямого охранника на строке 237 в xcode_backend.dart
          # Мы заменяем жесткое требование (!) на безопасный пропуск
          sed -i '' 's/buildSettings\["TARGET_DEVICE_IDENTIFIER"\]!/ "GenericDevice" /g' $FLUTTER_ROOT/packages/flutter_tools/bin/xcode_backend.dart
          
          # 3. Принудительно вписываем "GenericDevice" прямо в настройки сборки
          echo "TARGET_DEVICE_IDENTIFIER=GenericDevice" >> $GITHUB_ENV
          
          # Обновляем память Котика
          rm -f $FLUTTER_ROOT/bin/cache/flutter_tools.snapshot

      - name: Setup Environment
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > cert.p12
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build Application
        run: |
          flutter pub get
          # Подмена: "Чистка" = "Универсальность"
          export FLUTTER_XCODE_THIN_ARCHIVE=false
          flutter build ios --release --no-codesign
          
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../SmartBody_Final_Success.ipa Payload
            
      - name: Deliver Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-result-artifact
          path: SmartBody_Final_Success.ipa
