name: Build and Deploy iOS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Clean and Precache
        run: |
          flutter clean
          flutter pub get
          flutter precache --ios
          cd ios
          pod install --repo-update

      - name: Build iOS App
        run: |
          # Мы принудительно задаем ID и версию, чтобы скрипты Flutter не падали
          flutter build ios --release --no-codesign --no-tree-shake-icons \
            --build-number=1 \
            --build-name=1.0.0 \
            --extra-front-end-options=--no-implicit-dynamic-reexport
            
      - name: Create Payload for IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r SmartBodyLife.ipa Payload

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: SmartBodyLife.ipa
