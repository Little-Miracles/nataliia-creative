name: iOS Build and Publish
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Используем стабильную версию 3.24.0
          flutter-version: '3.24.0'

      - name: Setup Certificates and Keychain
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > cert.p12
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA
        run: |
          flutter pub get
          # ГЛАВНЫЙ СЕКРЕТ: Отключаем очистку архитектур, чтобы убрать Null check
          export FLUTTER_XCODE_THIN_ARCHIVE=false
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist --no-codesign
            
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          # Мы берем архив напрямую, если IPA не успеет создаться из-за сбоя в конце
          path: build/ios/archive/Runner.xcarchive
