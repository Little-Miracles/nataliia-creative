name: Build and Deploy iOS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Install CocoaPods and Generate Config
        run: |
          flutter precache --ios
          flutter pub get
          cd ios
          pod install --repo-update

      - name: Build iOS App
        run: |
          # Мы отключаем сканирование модулей, которое вызывало 60 000 строк логов
          flutter build ios --release --no-codesign --verbose --extra-front-end-options=--no-implicit-dynamic-reexport --compiler-filter="-Xcc -fno-modules-validate-system-headers"
      - name: Create Payload for IPA
        run: |
          mkdir -p Payload
          # Ищем скомпилированное приложение и упаковываем его
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r SmartBodyLife.ipa Payload

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: SmartBodyLife.ipa
