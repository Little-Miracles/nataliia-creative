name: iOS App Store Absolute Victory

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Distribution Certificate
        env:
          P12_DIST: ${{ secrets.P12_BASE64 }}
          P12_PASS: ${{ secrets.P12_PASSWORD }}
          PROV_DIST: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEY_PASS: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEY_PASS" build.keychain
          security unlock-keychain -p "$KEY_PASS" build.keychain
          echo -n "$P12_DIST" | base64 --decode -o cert.p12
          security import cert.p12 -P "$P12_PASS" -A -t cert -f pkcs12 -k build.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEY_PASS" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$PROV_DIST" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/SMART_DISTRIBUTION.mobileprovision

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.29.0'

      - name: Force Project Settings (Server-side)
        run: |
          flutter pub get
          # Мы ПРИНУДИТЕЛЬНО меняем настройки в файле проекта прямо на сервере Гитхаба
          # 1. Меняем iPhone Developer на Apple Distribution
          sed -i '' 's/iPhone Developer/Apple Distribution/g' ios/Runner.xcodeproj/project.pbxproj
          # 2. Включаем ручную подпись
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' ios/Runner.xcodeproj/project.pbxproj
          # 3. Прописываем имя нашего профиля
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = .*/PROVISIONING_PROFILE_SPECIFIER = "SMART_DISTRIBUTION";/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Build IPA
        run: |
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>PCSW3AKAPF</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.nataliia.smartbodylife</key>
              <string>SMART_DISTRIBUTION</string>
            </dict>
          </dict>
          </plist>
          EOF
          
          # Финальная команда сборки
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-store-release
          path: build/ios/ipa/*.ipa
