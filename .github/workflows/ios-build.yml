name: SMART-BODY-LIFE-TOTAL-SUCCESS

on:
  workflow_dispatch:

jobs:
  build:
    # Явно указываем macOS 15 для доступа к Xcode 26
    runs-on: macos-15 
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Flutter 3.13.9
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9' # Ваша версия Flutter остается прежней
          architecture: arm64

      - name: 3. Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: 4. Import Distribution Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 5. Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # Ставим профиль под его реальным именем
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/SMART_DISTRIBUTION.mobileprovision
          # Создаем копию с UUID для ExportOptions
          cp ~/Library/MobileDevice/Provisioning\ Profiles/SMART_DISTRIBUTION.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/f2e7364b-98c7-44ad-a0dc-84acd2d0fd80.mobileprovision

      - name: 6. Prepare Project
        run: |
          flutter clean
          flutter pub get

      - name: 7. Build Sealed IPA
        run: |
          # Теперь Котик просто берет ваш исправленный файл проекта и ExportOptions
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: 8. Give Me the Sealed Box
        uses: actions/upload-artifact@v4
        with:
          name: smart-body-life-READY-IPA
          path: build/ios/ipa/*.ipa
          retention-days: 10
