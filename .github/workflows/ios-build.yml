name: Internal System Diagnostic
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Setup Certificates
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > cert.p12
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Internal Error Capture
        run: |
          flutter pub get
          # Мы записываем ВЕСЬ поток ошибок в файл error_reason.log
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist --verbose > error_reason.log 2>&1 || true
          
          echo "--- ANALYZING REASON ---"
          # Команда выведет последние 50 строк лога прямо в консоль Гитхаба
          tail -n 50 error_reason.log

      - name: Upload Error Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-error-report
          path: error_reason.log
