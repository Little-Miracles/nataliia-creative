name: iOS Build and Publish
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Setup Certificates and Keychain
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > cert.p12
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build and Force Package
        run: |
          flutter pub get
          # Команда "|| true" говорит Котику: "Не смей падать, если будет ошибка в конце!"
          flutter build ios --release --no-codesign || true
          
          # Мы сами создаем папку для Apple и упаковываем приложение вручную
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r SmartBodyLife.ipa Payload
            
      - name: Upload Finished IPA
        # Этот шаг теперь сработает ВСЕГДА, даже если была ошибка выше
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smart-body-life-ready
          path: SmartBodyLife.ipa
