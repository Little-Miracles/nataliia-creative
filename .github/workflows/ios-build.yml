name: SmartBody Life Final Release

on:
  workflow_dispatch: # Запуск только по вашей кнопке

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: Install Dependencies
        run: |
          # Просто получаем пакеты и ставим поды, ничего не ломая
          flutter pub get
          cd ios
          pod install
          cd ..

      - name: Build IPA
        run: |
          # Собираем один раз, чисто и без лишних команд
          flutter build ipa --release --no-codesign

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_Life_Result
          # Собираем всё, что получилось в папке сборки
          path: build/ios/archive/Runner.xcarchive
