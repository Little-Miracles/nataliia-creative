name: DEEP-DIAGNOSTIC-AUDIT

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: macos-15
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Import Certs (Checking Keychain)
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 3. DATABASE AUDIT (The Inspector)
        run: |
          echo "=== ОТЧЕТ ДЛЯ НАТАЛЬИ: ПОИСК ОШИБОК ПОДПИСИ ==="
          
          echo -e "\n[1. СЕРТИФИКАТЫ]"
          # Проверяем, какой Team ID и имя владельца видит система в ключах
          security find-identity -v -p codesigning signing_temp.keychain
          
          echo -e "\n[2. ПРОФИЛЬ ПОДПИСИ]"
          # Проверяем, совпадает ли Bundle ID приложения с тем, что в профиле[cite: 4, 6]
          PROVISION_PATH=~/Library/MobileDevice/Provisioning\ Profiles/f2e7364b-98c7-44ad-a0dc-84acd2d0fd80.mobileprovision
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > $PROVISION_PATH
          grep -aA 2 "application-identifier" $PROVISION_PATH | grep "string"
          grep -a "UUID" -A 1 $PROVISION_PATH
          
          echo -e "\n[3. НАСТРОЙКИ ПРОЕКТА XCODE]"
          # Ищем, где жестко прописаны старые Team ID или стили подписи[cite: 4, 10]
          grep -r "DEVELOPMENT_TEAM" ios/Runner.xcodeproj/project.pbxproj
          grep -r "PRODUCT_BUNDLE_IDENTIFIER" ios/Runner.xcodeproj/project.pbxproj
          
          echo -e "\n[4. СТРУКТУРА МАНИФЕСТОВ]"
          # Показываем Котику, где физически лежат манифесты
          find . -name "PrivacyInfo.xcprivacy"
          
          echo -e "\n[5. АНАЛИЗ PODFILE]"
          # Проверяем, есть ли в Podfile инструкции для переподписи плагинов[cite: 5]
          cat ios/Podfile | grep -A 20 "post_install"
          
          echo -e "\n[6. ПРОВЕРКА EXPORT OPTIONS]"
          # Проверяем, правильно ли указан метод экспорта[cite: 6, 10]
          cat ios/ExportOptions.plist
          
          echo -e "\n=== АУДИТ ЗАВЕРШЕН ==="
