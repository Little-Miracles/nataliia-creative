name: SMART-BODY-LIFE-FINAL-TRIUMPH

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. Repair iOS Project Structure
        run: |
          # Это создаст недостающие файлы ios/Runner.xcodeproj
          # Мы делаем это ПЕРЕД установкой библиотек
          flutter create . --platforms ios --org com.nataliia --project-name smartbodylife

      - name: 4. Prepare Project Dependencies
        run: |
          # Теперь ставим ваши библиотеки (health 9.0.1 подтянется сама)
          flutter pub get

      - name: 5. Build iOS App
        run: |
          # Теперь папка ios на месте, и Котик сможет начать сборку
          flutter build ios --release --no-codesign

      - name: 6. Deliver Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBodyLife_iOS_App
          path: build/ios/iphoneos/*.app
          if-no-files-found: warn
          retention-days: 5
