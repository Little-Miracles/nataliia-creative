- name: 5. СБОРКА IPA (Xcode Direct)
        run: |
          # Создаем файл настроек экспорта
          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>PCSW3AKAPF</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.nataliia.smartbodylife</key>
              <string>f2e7364b-98c7-44ad-a0dc-84acd2d0fd80</string>
            </dict>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
          </dict>
          </plist>
          EOF

          # 1. Собираем архив (.xcarchive)
          # Добавляем переменные путей Flutter напрямую в Xcode
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            archive -archivePath build/Runner.xcarchive \
            FLUTTER_ROOT=$FLUTTER_HOME \
            ASSET_CATALOG_COMPILER_APPICON_NAME=AppIcon

          # 2. Экспортируем IPA из архива
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa

      - name: 6. ЗАБИРАЕМ IPA ДЛЯ APPLE
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SMART-BODY-LIFE-IPA
          path: build/ipa/*.ipa
