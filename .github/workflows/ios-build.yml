name: Build and Deploy iOS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Install Dependencies
        run: |
          flutter pub get
          flutter precache --ios
          cd ios
          pod install --repo-update

      - name: Build iOS App
        run: |
          # Передаем настройки подписи напрямую как аргументы сборки
          flutter build ios --release --no-codesign --no-tree-shake-icons \
            --dart-define=CODE_SIGNING_ALLOWED=NO \
            --extra-front-end-options=--no-implicit-dynamic-reexport
            
      - name: Create Payload for IPA
        run: |
          mkdir -p Payload
          # Собираем то, что Xcode успел построить до падения скрипта упаковки
          cp -r build/ios/iphoneos/Runner.app Payload/ || cp -r build/ios/Release-iphoneos/Runner.app Payload/
          zip -r SmartBodyLife.ipa Payload

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: SmartBodyLife.ipa
