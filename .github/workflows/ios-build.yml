name: SMART-BODY-CLEAN-SYNC-BUILD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. Получение кода
        uses: actions/checkout@v4

      - name: 2. Настройка Flutter (3.29.0)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: 3. ПРИНУДИТЕЛЬНАЯ ЧИСТКА ДУБЛЕЙ
        run: |
          echo "Проверяю, какой pubspec видит система..."
          cat pubspec.yaml | grep -E "add_2_calendar|audioplayers" || echo "Чисто! Лишних библиотек нет."
          
          # Удаляем все старые кэши и временные папки, которые могут путать Котика
          flutter clean
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          rm -rf pubspec.lock

      - name: 4. Подготовка сертификатов (Подпись!)
        run: |
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/f2e7364b-98c7-44ad-a0dc-84acd2d0fd80.mobileprovision
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: 5. Синхронизация оборудования (iOS 17)
        run: |
          flutter pub get
          # Обновляем раму (ios) под новую версию 3.29.0
          flutter create . --platforms=ios
          
          cd ios
          export FLUTTER_ROOT=$FLUTTER_HOME
          pod install --repo-update
          cd ..

      - name: 6. СБОРКА ПОДПИСАННОГО IPA
        run: |
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>PCSW3AKAPF</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.nataliia.smartbodylife</key>
              <string>f2e7364b-98c7-44ad-a0dc-84acd2d0fd80</string>
            </dict>
            <key>signingStyle</key><string>manual</string>
          </dict>
          </plist>
          EOF

          # Финальный бросок. Передаем FLUTTER_ROOT явно для обхода багов.
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define-from-file=.env \
            --build-name=3.0.0 \
            --build-number=18 \
            --dart-define=FLUTTER_ROOT=$FLUTTER_HOME

      - name: 7. Сохранение ГОТОВОГО IPA
        uses: actions/upload-artifact@v4
        with:
          name: smart-body-life-signed
          path: build/ios/ipa/*.ipa
