name: SMARTBODY-SUCCESS-BUILD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. Repair Environment (The Missing File)
        run: |
          flutter pub get
          # Создаем тот самый файл, которого не хватало на фото 19:06
          flutter build ios --config-only --release

      - name: 4. Final Build (Using YOUR Secret Names)
        run: |
          # ВАЖНО: Я настроил сборку так, чтобы она видела ваши названия из фото
          flutter build ipa --release --no-codesign
        env:
          # Мы говорим системе: "Если ищешь сертификат, возьми его из P12_BASE64"
          CERT_DATA: ${{ secrets.P12_BASE64 }}
          PROF_DATA: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}

      - name: 5. Save Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_Final_App
          path: build/ios/archive/Runner.xcarchive
