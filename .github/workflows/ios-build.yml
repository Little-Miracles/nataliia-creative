name: SMART-BODY-LIFE-AUDIT

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: macos-15
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. File Audit Report
        run: |
          echo "STEP 1: Root Folder Content"
          ls -F
          
          echo "STEP 2: iOS Folder Check"
          if [ -d "ios" ]; then
            echo "RESULT: Folder 'ios' EXISTS"
            ls -F ios/
          else
            echo "RESULT: Folder 'ios' IS MISSING"
          fi

          echo "STEP 3: Critical Files Check"
          [ -f "ios/Podfile" ] && echo "Podfile: FOUND" || echo "Podfile: NOT FOUND"
          [ -d "ios/Runner.xcodeproj" ] && echo "xcodeproj: FOUND" || echo "xcodeproj: NOT FOUND"
          [ -d "ios/Runner.xcworkspace" ] && echo "xcworkspace: FOUND" || echo "xcworkspace: NOT FOUND"

          echo "STEP 4: Deep Search"
          find . -name "Runner.xcodeproj" -o -name "Podfile"
