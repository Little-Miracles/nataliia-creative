name: SMART-BODY-LIFE-TOTAL-STABILITY

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. ПОДГОТОВКА ИСХОДНИКОВ
        uses: actions/checkout@v4

      - name: 2. НАСТРОЙКА ИНСТРУМЕНТОВ
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: 3. ПОДГОТОВКА СЕРТИФИКАТОВ И ENV
        run: |
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/f2e7364b-98c7-44ad-a0dc-84acd2d0fd80.mobileprovision
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: 4. СОЗДАНИЕ ОСТРОВКА СТАБИЛЬНОСТИ (Устранение Null Check)
        run: |
          flutter pub get
          
          # Генерируем конфиги
          flutter build ios --config-only --release --no-codesign
          
          # ПРИНУДИТЕЛЬНОЕ ЗАПОЛНЕНИЕ ПУСТОТЫ
          # Создаем папки, которые ищет скрипт xcode_backend
          mkdir -p ios/Flutter/App.framework
          
          # Явно прописываем адреса в "записную книжку"
          echo "PACKAGE_CONFIG=$GITHUB_WORKSPACE/.dart_tool/package_config.json" >> ios/Flutter/Generated.xcconfig
          echo "FLUTTER_APPLICATION_PATH=$GITHUB_WORKSPACE" >> ios/Flutter/Generated.xcconfig
          echo "FLUTTER_TARGET=lib/main.dart" >> ios/Flutter/Generated.xcconfig
          echo "ASSET_CATALOG_COMPILER_APPICON_NAME=AppIcon" >> ios/Flutter/Generated.xcconfig
          
          cd ios
          pod install --repo-update
          cd ..

      - name: 5. СБОРКА IPA
        run: |
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>PCSW3AKAPF</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.nataliia.smartbodylife</key>
              <string>f2e7364b-98c7-44ad-a0dc-84acd2d0fd80</string>
            </dict>
            <key>signingStyle</key><string>manual</string>
          </dict>
          </plist>
          EOF

          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define-from-file=.env

      - name: 6. ПОЛУЧЕНИЕ IPA
        uses: actions/upload-artifact@v4
        with:
          name: smart-body-life-ipa
          path: build/ios/ipa/*.ipa
