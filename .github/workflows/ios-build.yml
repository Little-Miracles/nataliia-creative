name: H-FINAL-SUCCESS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. Create instruction
        run: |
          flutter pub get
          # Генерируем файл, которого не хватало
          flutter build ios --config-only --release

      - name: 4. Build IPA (Final Run)
        run: |
          # Собираем приложение без подписи
          flutter build ipa --release --no-codesign
        env:
          CERT_DATA: ${{ secrets.P12_BASE64 }}
          PROF_DATA: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}

      - name: 5. Save Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_Final_H
          path: build/ios/archive/Runner.xcarchive
