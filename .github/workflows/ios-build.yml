name: SMART-BODY-LIFE-DIAGNOSTIC

on:
  workflow_dispatch:

jobs:
  check-files:
    runs-on: macos-15
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. List all files (The Light)
        run: |
          # Команда покажет абсолютно всё, что Котик видит в корне и в папке ios
          echo "Full project structure:"
          ls -R
          
      - name: 3. Verify specific paths
        run: |
          # Проверяем наличие файла, который вы видите на фото
          if [ -f "ios/Runner.xcodeproj/project.pbxproj" ]; then
            echo "SUCCESS: Project file found at ios/Runner.xcodeproj"
          else
            echo "ERROR: Project file NOT found in ios/Runner.xcodeproj"
            # Ищем, где он спрятался
            find . -name "Runner.xcodeproj"
          fi
