name: SMART-BODY-LIFE-DIRECT-COLLECT

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. Получение кода
        uses: actions/checkout@v4

      - name: 2. Настройка Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'

      - name: 3. Подготовка (минимум команд)
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          flutter pub get
          cd ios && pod install --repo-update && cd ..

      - name: 4. Сборка (Создаем тот самый файл)
        run: |
          # Мы просто запускаем сборку. Она создаст папку Runner.app
          flutter build ios --release --no-codesign --dart-define-from-file=.env

      - name: 5. ПУТЬ К ФАЙЛУ (Забираем результат)
        # Эта команда сработает ВСЕГДА, даже если шаг выше покажет ошибку
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: READY-APP-FOLDER
          # Это тот самый путь, по которому лежит готовый файл
          path: build/ios/iphoneos/
