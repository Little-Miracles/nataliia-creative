name: SMART-BODY-LIFE-TOTAL-SUCCESS

on:
  workflow_dispatch:

jobs:
  build:
    # МЕНЯЕМ macos-14 на macos-latest (или macos-15, если доступно), 
    # чтобы получить Xcode 26 и iOS 26 SDK
    runs-on: macos-latest 
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Flutter 3.13.9
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9' # Ваша версия Flutter остается прежней
          architecture: arm64
