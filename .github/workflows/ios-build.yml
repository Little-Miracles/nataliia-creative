name: SMART-BODY-LIFE-AUTO-FIX-BUILD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. Получение кода
        uses: actions/checkout@v4

      - name: 2. Настройка стабильного Flutter (3.27.4)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'

      - name: 3. Подготовка сертификатов
        run: |
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/f2e7364b-98c7-44ad-a0dc-84acd2d0fd80.mobileprovision
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: 4. Автоматическое исправление оборудования
        run: |
          # Удаляем сломанный lock-файл, чтобы Flutter создал его сам без ошибок
          rm -f pubspec.lock
          
          # Заставляем Flutter собрать правильный список зависимостей
          flutter pub get
          
          # Убираем win32, чтобы он не мешал сборке под iOS
          sed -i '' '/win32:/d' pubspec.lock
          sed -i '' '/- win32/d' pubspec.lock
          
          flutter create . --platforms=ios
          
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..

      - name: 5. Сборка IPA
        run: |
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>PCSW3AKAPF</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.nataliia.smartbodylife</key>
              <string>f2e7364b-98c7-44ad-a0dc-84acd2d0fd80</string>
            </dict>
            <key>signingStyle</key><string>manual</string>
          </dict>
          </plist>
          EOF

          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define-from-file=.env \
            --build-name=3.0.0 \
            --build-number=18

      - name: 6. Сохранение файла
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: smart-body-life-ready
          path: build/ios/ipa/*.ipa
