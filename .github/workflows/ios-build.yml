name: G-STRICT-PATH

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. Manual Config Injection
        run: |
          flutter pub get
          # Генерируем файл
          flutter build ios --config-only --release
          
          # ПРИНУДИТЕЛЬНО создаем файл, если он вдруг не создался
          if [ ! -f ios/Flutter/Generated.xcconfig ]; then
            echo "Creating file manually..."
            echo "FLUTTER_ROOT=$FLUTTER_ROOT" > ios/Flutter/Generated.xcconfig
            echo "FLUTTER_APPLICATION_PATH=$GITHUB_WORKSPACE" >> ios/Flutter/Generated.xcconfig
          fi
          
          # Прописываем пути в системные переменные
          echo "FLUTTER_XCODE_SETTINGS=true" >> $GITHUB_ENV

      - name: 4. Final Archive Attempt
        run: |
          # Собираем архив с жестким указанием пути к Flutter
          flutter build ipa --release --no-codesign --verbose
        env:
          CERT_DATA: ${{ secrets.P12_BASE64 }}
          PROF_DATA: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}

      - name: 5. Save Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_G_Result
          path: build/ios/archive/Runner.xcarchive
