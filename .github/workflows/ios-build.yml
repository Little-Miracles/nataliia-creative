name: iOS Soft Redirection Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Redefine Concepts (The Way of Redirection)
        run: |
          # Мы не удаляем функции. Мы подменяем их результат.
          # Везде, где система просит ID, мы подкладываем значение "GenericDevice".
          # Котик думает, что нашел то, что искал, и спокойно работает дальше.
          find $FLUTTER_ROOT -name "*.dart" -exec sed -i '' 's/buildSettings\["TARGET_DEVICE_IDENTIFIER"\]/ "GenericDevice" /g' {} +
          
          # Мы подменяем понятие "Ошибка пустоты" (Null) на "Безопасное значение".
          find $FLUTTER_ROOT -name "*.dart" -exec sed -i '' 's/! \/\/ \/ \/ NULL CHECK/ ?? "GenericDevice" /g' {} +

          # Обновляем внутренний словарь Котика
          rm -f $FLUTTER_ROOT/bin/cache/flutter_tools.snapshot

      - name: Setup Official Environment
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > cert.p12
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build Application (General Mode)
        run: |
          flutter pub get
          # Мы официально разрешаем Котику НЕ делать разделение (чистку)
          export FLUTTER_XCODE_THIN_ARCHIVE=false
          flutter build ios --release --no-codesign
          
          # Упаковываем результат в универсальную форму
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../SmartBody_Redirected.ipa Payload
            
      - name: Deliver Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redirected-build-artifact
          path: SmartBody_Redirected.ipa
