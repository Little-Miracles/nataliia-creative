name: SMART-BODY-LIFE-PRIVACY-FIX

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. Загрузка кода из репозитория
        uses: actions/checkout@v4

      - name: 2. Оборудование Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: 3. Новый Flutter 3.29.0 (с защитой Apple)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: 4. Обновление библиотек (из письма Apple)
        run: |
          # Обновляем device_info_plus, url_launcher и видео-плеер до версий с манифестами
          flutter pub upgrade
          flutter pub get

      - name: 5. Сборка архива (без подписи для теста)
        run: |
          # Собираем архив, чтобы проверить наличие файлов PrivacyInfo
          flutter build ipa --release --no-codesign

      - name: 6. ПРОВЕРКА МАНИФЕСТОВ (Ответ для Apple)
        run: |
          APP_PATH=$(find build/ios/archive -name "*.app" | head -n 1)
          echo "=== Ищем файлы, которые требовал Apple в письме ==="
          # Эта команда покажет список всех найденных манифестов в приложении
          find "$APP_PATH" -name "PrivacyInfo.xcprivacy"
