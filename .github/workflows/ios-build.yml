name: X-FORCE-GENERATE-SUCCESS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. Radical Repair
        run: |
          flutter pub get
          # 1. Удаляем старый проект Xcode, который вызывает ошибку несовместимости
          rm -rf ios/Runner.xcodeproj
          rm -rf ios/Runner.xcworkspace
          
          # 2. Создаем его заново с твоим правильным именем и организацией
          PROJECT_NAME=$(grep '^name:' pubspec.yaml | awk '{print $2}')
          flutter create . --platforms ios --org com.nataliia --project-name $PROJECT_NAME
          
          # 3. Убираем "занозу" 237 из свежесозданного файла
          sed -i '' 's/embed_and_thin//g' ios/Runner.xcodeproj/project.pbxproj
          
          # 4. Финальная подготовка
          flutter build ios --config-only --release

      - name: 4. Build IPA
        run: |
          # Теперь проект гарантированно совместим
          flutter build ipa --release --no-codesign
        env:
          CERT_DATA: ${{ secrets.P12_BASE64 }}
          PROF_DATA: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}

      - name: 5. Save Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_Final_X
          path: build/ios/archive/Runner.xcarchive
