name: F-CLEAN-BUILD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. Create instruction and clean
        run: |
          flutter pub get
          # Генерируем файл-инструкцию
          flutter build ios --config-only --release
          # Принудительно чистим только кэш Xcode, не трогая твои файлы
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          pod install --repo-update
          cd ..

      - name: 4. Build IPA
        run: |
          # Прямая сборка с игнорированием пустых путей
          flutter build ipa --release --no-codesign --verbose
        env:
          CERT_DATA: ${{ secrets.P12_BASE64 }}
          PROF_DATA: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}

      - name: 5. Save Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_F_Result
          path: build/ios/archive/Runner.xcarchive
