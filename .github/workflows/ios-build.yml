name: iOS App Store Absolute Victory FINAL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Certificates and Profiles
        env:
          P12_DIST: ${{ secrets.P12_BASE64 }}
          P12_PASS: ${{ secrets.P12_PASSWORD }}
          PROV_DIST: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEY_PASS: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Создаем временную связку ключей (keychain)
          security create-keychain -p "$KEY_PASS" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEY_PASS" build.keychain
          
          # Декодируем сертификат и импортируем его в связку
          echo -n "$P12_DIST" | base64 --decode -o dist.p12
          security import dist.p12 -P "$P12_PASS" -A -t cert -f pkcs12 -k build.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEY_PASS" build.keychain
          
          # Устанавливаем профиль в системную папку Apple
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$PROV_DIST" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/SMART_DISTRIBUTION.mobileprovision

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.29.0'

      - name: Prepare Project Settings
        run: |
          flutter pub get
          PBX="ios/Runner.xcodeproj/project.pbxproj"
          
          # Принудительно выключаем автоматическую подпись в файле проекта
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBX"
          sed -i '' 's/ProvisioningStyle = Automatic/ProvisioningStyle = Manual/g' "$PBX"
          
          # Жестко прописываем наш сертификат и имя профиля в настройки Xcode
          sed -i '' 's/DEVELOPMENT_TEAM = PCSW3AKAPF;/DEVELOPMENT_TEAM = PCSW3AKAPF; CODE_SIGN_IDENTITY = "Apple Distribution"; PROVISIONING_PROFILE_SPECIFIER = "SMART_DISTRIBUTION";/g' "$PBX"

      - name: Build IPA
        run: |
          # Создаем ExportOptions.plist — это паспорт нашей сборки
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>PCSW3AKAPF</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.nataliia.smartbodylife</key>
              <string>SMART_DISTRIBUTION</string>
            </dict>
          </dict>
          </plist>
          EOF
          
          # Запускаем сборку IPA (теперь без лишних команд, только база)
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-store-release
          path: build/ios/ipa/*.ipa
