name: SmartBody-Final-Success

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. Force Generate Configs
        run: |
          # Это создаст тот самый файл Generated.xcconfig, которого не хватает на фото
          flutter pub get
          flutter build ios --config-only --release

      - name: 4. Build IPA (No-Sign Mode)
        run: |
          # Теперь, когда конфиги на месте, собираем основной архив
          flutter build ipa --release --no-codesign

      - name: 5. Save Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_Final_IPA
          path: build/ios/archive/Runner.xcarchive
