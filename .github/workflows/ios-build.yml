name: iOS App Store Victory Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Both Certificates and Profiles
        env:
          P12_DIST: ${{ secrets.P12_BASE64 }}
          P12_DEV: ${{ secrets.DEV_P12_BASE64 }}
          P12_PASS: ${{ secrets.P12_PASSWORD }}
          PROV_PROF: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEY_PASS: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          DIST_PATH=$RUNNER_TEMP/dist.p12
          DEV_PATH=$RUNNER_TEMP/dev.p12
          PP_PATH=$RUNNER_TEMP/build.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app.keychain-db
          
          echo -n "$P12_DIST" | base64 --decode -o $DIST_PATH
          echo -n "$P12_DEV" | base64 --decode -o $DEV_PATH
          echo -n "$PROV_PROF" | base64 --decode -o $PP_PATH
          
          security create-keychain -p "$KEY_PASS" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEY_PASS" $KEYCHAIN_PATH
          
          security import $DIST_PATH -P "$P12_PASS" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security import $DEV_PATH -P "$P12_PASS" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEY_PASS" $KEYCHAIN_PATH
          
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.29.0'

      - name: Project Surgery and Build
        run: |
          flutter clean
          flutter pub get
          
          # ХИРУРГИЯ: Принудительно меняем в настройках проекта тип подписи на Distribution и наш профиль
          # Это заставит Xcode использовать SMART_DISTRIBUTION даже для этапа архивации
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = .*/PROVISIONING_PROFILE_SPECIFIER = "SMART_DISTRIBUTION";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer"/CODE_SIGN_IDENTITY = "Apple Distribution"/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Создаем ExportOptions
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>PCSW3AKAPF</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.nataliia.smartbodylife</key>
              <string>SMART_DISTRIBUTION</string>
            </dict>
          </dict>
          </plist>
          EOF
          
          # Сборка
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-store-release
          path: build/ios/ipa/*.ipa
