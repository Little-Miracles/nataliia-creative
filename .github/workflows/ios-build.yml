name: Z-FINAL-BUILD-APP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. Repair Environment
        run: |
          flutter pub get
          # Создаем Generated.xcconfig (яблоко в коробку)
          flutter build ios --config-only --release

      - name: 4. Build Mobile Archive
        run: |
          # Используем ваши названия секретов из фото 19:30
          flutter build ipa --release --no-codesign
        env:
          CERT_DATA: ${{ secrets.P12_BASE64 }}
          PROF_DATA: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}

      - name: 5. Save Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_Result
          path: build/ios/archive/Runner.xcarchive
