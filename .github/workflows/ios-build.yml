name: Build and Deploy iOS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          cd ios
          pod install --repo-update

      - name: Build iOS App
        run: |
          # Мы принудительно заставляем Flutter игнорировать старые скрипты Xcode
          flutter build ios --release --no-codesign --verbose

      - name: Create Payload for IPA
        run: |
          mkdir -p Payload
          # Ищем скомпилированное приложение и упаковываем его
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r SmartBodyLife.ipa Payload

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: SmartBodyLife.ipa
