name: SUCCESS-GET-FILE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. Radical Fix (Proven)
        run: |
          flutter pub get
          rm -rf ios/Runner.xcodeproj
          rm -rf ios/Runner.xcworkspace
          PROJECT_NAME=$(grep '^name:' pubspec.yaml | awk '{print $2}')
          flutter create . --platforms ios --org com.nataliia --project-name $PROJECT_NAME
          sed -i '' 's/embed_and_thin//g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = "PCSW3AKAPF";/g' ios/Runner.xcodeproj/project.pbxproj

      - name: 4. Build IPA (The Action)
        continue-on-error: true
        run: |
          flutter build ios --release --no-codesign --no-version-check

      - name: 5. Pack Everything (The Treasure Chest)
        if: always()
        run: |
          mkdir -p out_assets
          # Собираем всё, что Котик успел создать
          cp -R build/ios/iphoneos/Runner.app out_assets/ || true
          # Если создался архив - забираем и его
          cp -R build/ios/archive/Runner.xcarchive out_assets/ || true

      - name: 6. Show Me The Money
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_COMPLETE_APP
          path: out_assets/
