name: DIAGNOSTIC-MODE-FOR-KOTIK

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: macos-15
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Настройка Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: 3. ПРЯМОЙ ОТЧЕТ КОТИКА (Doctor)
        run: flutter doctor -v

      - name: 4. ЗАПУСК ДИАГНОСТИКИ СБОРКИ (Генерация ответа системы)
        run: |
          flutter pub get
          cd ios
          # Мы запускаемverbose режим. Котик напишет сотни строк лога,
          # где в самом конце будет точный ответ от внутреннего скрипта xcode_backend.dart
          flutter build ios --release --no-codesign --verbose
