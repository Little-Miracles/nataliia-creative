name: SMART-BODY-LIFE-FINAL-IPA-DELIVERY

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Flutter 3.13.9
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          architecture: arm64

      - name: 3. Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: 4. Import Your Certificate (P12)
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 5. Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # Мы устанавливаем профиль по его UUID, как указано в вашем Plist
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/f2e7364b-98c7-44ad-a0dc-84acd2d0fd80.mobileprovision
          echo "Профиль готов."

      - name: 6. Prepare Project
        run: |
          flutter clean
          flutter pub get

      - name: 7. Build Ready-to-Send IPA
        run: |
          # Собираем IPA напрямую. 
          # Мы убрали --no-codesign, чтобы Flutter завершил упаковку посылки
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: 8. Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: smart-body-life-READY-IPA
          # Забираем только готовый файл .ipa
          path: build/ios/ipa/*.ipa
          retention-days: 10
