name: SMART-BODY-LIFE-VERIFY-FIX

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: macos-15
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Check New File Path
        run: |
          echo "Checking the specific file you just created:"
          if [ -f "ios/Runner.xcodeproj/project.pbxproj" ]; then
            echo "SUCCESS: File found at ios/Runner.xcodeproj/project.pbxproj"
          else
            echo "ERROR: File still not found in the expected location."
            echo "Let's see where it actually is:"
            find . -name "project.pbxproj"
          fi

      - name: 3. Final Audit Status
        run: |
          [ -d "ios/Runner.xcodeproj" ] && echo "xcodeproj folder: EXISTS" || echo "xcodeproj folder: MISSING"
          [ -f "ios/Runner.xcodeproj/project.pbxproj" ] && echo "project.pbxproj: FOUND" || echo "project.pbxproj: NOT FOUND"
