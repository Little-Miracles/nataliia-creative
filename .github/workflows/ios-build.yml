name: iOS Final Logical Fix
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Repair Instruction (Исправляем то, что нашли)
        run: |
          # Котик сам показал нам эту строку (618). 
          # Мы официально меняем требование "живого тела" (YES) на "универсальную сборку" (NO).
          sed -i '' 's/ONLY_ACTIVE_ARCH = YES;/ONLY_ACTIVE_ARCH = NO;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Также подправим настройки SDK, чтобы он не искал конкретную версию 15.5, а брал текущую
          sed -i '' 's/SDKROOT = iphoneos.*;/SDKROOT = iphoneos;/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Setup Signing (Стандартный этап)
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > cert.p12
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build Application
        run: |
          flutter pub get
          # Теперь, когда инструкция говорит NO (не ищи устройство), 
          # Котик должен спокойно собрать IPA.
          flutter build ios --release --no-codesign
          
          # Упаковываем результат
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../SmartBody_Success.ipa Payload
            
      - name: Deliver Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-success-ipa
          path: SmartBody_Success.ipa
