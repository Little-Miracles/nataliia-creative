name: iOS Debug Certificate Diagnosis

on:
  workflow_dispatch:

jobs:
  debug-ios:
    runs-on: macos-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Secrets Arrival
        env:
          CERT_BASE64: ${{ secrets.IOS_CERTIFICATE }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE }}
        run: |
          echo "=== SECRET CHECK ==="
          echo "CERT length: ${#CERT_BASE64}"
          echo "PROFILE length: ${#PROFILE_BASE64}"

      - name: Create Files From Secrets
        env:
          CERT_BASE64: ${{ secrets.IOS_CERTIFICATE }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE }}
        run: |
          echo "=== FILE CREATION ==="

          CERT_PATH=$RUNNER_TEMP/cert.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision

          echo "$CERT_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          echo "CERT file size:"
          ls -lh $CERT_PATH

          echo "PROFILE file size:"
          ls -lh $PROFILE_PATH

          echo "CERT file type:"
          file $CERT_PATH

      - name: Inspect Provisioning Profile
        run: |
          echo "=== PROFILE INFO ==="
          security cms -D -i $RUNNER_TEMP/profile.mobileprovision | head -n 50

      - name: Inspect Certificate (if valid)
        run: |
          echo "=== CERT INFO ==="
          security find-identity -v -p codesigning
