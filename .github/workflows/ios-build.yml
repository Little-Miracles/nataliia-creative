name: iOS Final Clear Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Setup Simulation Env
        run: |
          # Подкладываем бумажку с номером устройства во все карманы системы
          echo "TARGET_DEVICE_IDENTIFIER=GenericDevice" >> $GITHUB_ENV
          export TARGET_DEVICE_IDENTIFIER=GenericDevice

      - name: Setup Environment
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > cert.p12
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build Application
        run: |
          flutter pub get
          # Подмена понятия: Чистка = Универсальность
          export FLUTTER_XCODE_THIN_ARCHIVE=false
          # Строгая команда без лишних слов, которую Котик точно поймет
          flutter build ios --release --no-codesign
          
          # Упаковка того, что Котик построит
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../SmartBody_Final.ipa Payload
            
      - name: Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-build-artifact
          path: SmartBody_Final.ipa
