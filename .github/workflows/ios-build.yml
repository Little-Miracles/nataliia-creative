name: SMART-BODY-LIFE-TOTAL-STABILITY

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. ПОДГОТОВКА ИСХОДНИКОВ
        uses: actions/checkout@v4

      - name: 2. НАСТРОЙКА FLUTTER (3.29.0)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: 3. СЕРТИФИКАТЫ
        run: |
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/f2e7364b-98c7-44ad-a0dc-84acd2d0fd80.mobileprovision
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: 4. ЛЕЧЕНИЕ "ПУСТОТЫ" (Sed Injection)
        run: |
          flutter pub get
          
          # Генерируем базовый конфиг
          flutter build ios --config-only --release --no-codesign
          
          # ПРИНУДИТЕЛЬНО прописываем пути в Generated.xcconfig
          echo "FLUTTER_FRAMEWORK_DIR=$GITHUB_WORKSPACE/ios/Flutter" >> ios/Flutter/Generated.xcconfig
          echo "FLUTTER_APPLICATION_PATH=$GITHUB_WORKSPACE" >> ios/Flutter/Generated.xcconfig
          
          # Магия: исправляем проект Xcode, чтобы он знал, где лежат инструменты Flutter
          # Это удаляет ту самую причину Null Check
          sed -i '' 's|$(inherited)|$GITHUB_WORKSPACE/ios/Flutter $(inherited)|g' ios/Runner.xcodeproj/project.pbxproj
          
          cd ios
          pod install --repo-update
          cd ..

      - name: 5. СБОРКА IPA
        run: |
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>PCSW3AKAPF</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.nataliia.smartbodylife</key>
              <string>f2e7364b-98c7-44ad-a0dc-84acd2d0fd80</string>
            </dict>
            <key>signingStyle</key><string>manual</string>
          </dict>
          </plist>
          EOF

          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define-from-file=.env

      - name: 6. ЗАГРУЗКА
        uses: actions/upload-artifact@v4
        with:
          name: smart-body-life-ipa
          path: build/ios/ipa/*.ipa
