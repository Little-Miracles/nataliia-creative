name: AUDIT-FOR-KOTIK

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - name: 1. Допрос системы (Узнаем правду у Котика)
        run: |
          echo "=== ПРОВЕРКА ВЕРСИИ СИСТЕМЫ ==="
          sw_vers
          
          echo "=== КАКОЙ XCODE СТОИТ ПО УМОЛЧАНИЮ? ==="
          xcodebuild -version
          
          echo "=== КАКИЕ SDK ДОСТУПНЫ КОТИКУ? ==="
          xcodebuild -showsdks
          
          echo "=== ГДЕ ПРЯЧЕТСЯ НОВЫЙ XCODE 16.2 (SDK 26)? ==="
          ls /Applications | grep Xcode
          
          echo "=== ПРОВЕРКА ПУТЕЙ FLUTTER ==="
          flutter doctor -v
