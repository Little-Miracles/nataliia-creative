name: SMART-BODY-LIFE-DIAGNOSTIC-AUDIT

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: macos-14
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Check Default Flutter Version
        run: flutter --version

      - name: 3. Audit Assets and Env
        run: |
          echo "Проверка наличия .env:"
          ls -a | grep .env || echo "Файл .env НЕ НАЙДЕН"
          echo "Проверка структуры папок:"
          ls -R ui_images/ | head -n 5

      - name: 4. Flutter Doctor (Full Report)
        run: flutter doctor -v

      - name: 5. Dry Run Build (Checking Dependencies)
        run: flutter pub get
