name: SMART-BODY-LIFE-TOTAL-SUCCESS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. Получение кода
        uses: actions/checkout@v4

      - name: 2. Настройка Flutter (3.29.0)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: 3. Подготовка сертификатов
        run: |
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/f2e7364b-98c7-44ad-a0dc-84acd2d0fd80.mobileprovision
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: 4. Подготовка окружения (Исправление PropertyList)
        run: |
          mkdir -p ios/Flutter
          
          # 1. Заглушка для скриптов
          echo "exit 0" > ios/Flutter/xcode_backend.sh
          chmod +x ios/Flutter/xcode_backend.sh
          
          # 2. Файл конфигурации
          echo '#include "Generated.xcconfig"' > ios/Flutter/Release.xcconfig
          
          # 3. ПРАВИЛЬНЫЙ AppFrameworkInfo.plist (XML формат)
          cat <<EOF > ios/Flutter/AppFrameworkInfo.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>App</string>
            <key>CFBundleIdentifier</key>
            <string>io.flutter.flutter.app</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>App</string>
            <key>CFBundlePackageType</key>
            <string>FMWK</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
          </dict>
          </plist>
          EOF
          
          flutter pub get
          
          export FLUTTER_ROOT=/Users/runner/hostedtoolcache/Flutter/3.29.0-stable/arm64
          export FLUTTER_BUILD_MODE=release
          
          cd ios
          pod install --repo-update
          cd ..

      - name: 5. ЗАПУСК СБОРКИ IPA (Версия 3.0.0, Билд 18)
        run: |
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>PCSW3AKAPF</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.nataliia.smartbodylife</key>
              <string>f2e7364b-98c7-44ad-a0dc-84acd2d0fd80</string>
            </dict>
            <key>signingStyle</key><string>manual</string>
          </dict>
          </plist>
          EOF

          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define-from-file=.env

      - name: 6. СОХРАНЕНИЕ ГОТОВОГО ФАЙЛА
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: smart-body-life-ipa
          path: build/ios/ipa/*.ipa
