name: UPGRADE-COMPATIBILITY-AUDIT

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: macos-15
    steps:
      - name: 1. Checkout (Загрузка проекта)
        uses: actions/checkout@v4

      - name: 2. АУДИТ ФАЙЛОВ ДЛЯ ОБНОВЛЕНИЯ
        run: |
          echo "=== ОТЧЕТ: ЧТО НУЖНО ОТРЕДАКТИРОВАТЬ ДЛЯ НОВОЙ СБОРКИ ==="
          
          echo -e "\n[1. ФАЙЛЫ КОНФИГУРАЦИИ (iOS)]"
          # Проверяем наличие устаревших параметров в файлах проекта
          grep -rn "IPHONEOS_DEPLOYMENT_TARGET" ios/Runner.xcodeproj/project.pbxproj
          
          echo -e "\n[2. ПРОВЕРКА ВЕРСИЙ ПЛАГИНОВ В PUBSPEC]"
          # Показываем текущие версии, чтобы понять, насколько сильно их нужно "подтягивать"
          cat pubspec.yaml | grep -E "device_info_plus|url_launcher|video_player"
          
          echo -e "\n[3. АНАЛИЗ PODFILE (Сценарии сборки)]"
          # Ищем старые скрипты, которые могут помешать автоматике новой сборки
          if [ -f "ios/Podfile" ]; then
            cat ios/Podfile
          fi
          
          echo -e "\n[4. ПРОВЕРКА INFO.PLIST (Требования Apple 2026)]"
          # Смотрим, какие ключи уже есть, а каких не хватает для новой версии
          cat ios/Runner/Info.plist
          
          echo -e "\n[5. СКРЫТЫЕ НАСТРОЙКИ FLUTTER]"
          # Проверяем файлы, которые управляют версией SDK при сборке
          find ios/Flutter -name "*.xcconfig" -exec echo "--- {} ---" \; -exec cat {} \;
          
          echo -e "\n=== АУДИТ ЗАВЕРШЕН ==="
