name: SMARTBODY-REVISION-CAT

on:
  workflow_dispatch:

jobs:
  inspection:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Project config audit
        run: |
          echo "=== XCODE PROJECT INSPECTION ==="
          # Ищем Team ID и Bundle ID в файле проекта
          TEAM_ID=$(grep "DEVELOPMENT_TEAM" ios/Runner.xcodeproj/project.pbxproj | head -n 1 | cut -d'=' -f2 | tr -d ' ;')
          BUNDLE_ID=$(grep "PRODUCT_BUNDLE_IDENTIFIER" ios/Runner.xcodeproj/project.pbxproj | head -n 1 | cut -d'=' -f2 | tr -d ' ;')
          echo "Project Team ID: [$TEAM_ID]"
          echo "Project Bundle ID: [$BUNDLE_ID]"

      - name: 3. Folder audit
        run: |
          echo "=== IOS/FLUTTER FOLDER INSPECTION ==="
          # Проверяем, есть ли яблоко в коробке (Generated.xcconfig)
          if [ -f ios/Flutter/Generated.xcconfig ]; then 
            echo "RESULT: Generated.xcconfig FOUND"
          else 
            echo "RESULT: Generated.xcconfig MISSING"
          fi
          echo "Files in ios/Flutter/:"
          ls ios/Flutter/

      - name: 4. Secrets audit
        env:
          CERT_DATA: ${{ secrets.IOS_CERTIFICATE }}
        run: |
          echo "=== GITHUB SECRETS INSPECTION ==="
          if [ -z "$CERT_DATA" ]; then
            echo "ERROR: Secret IOS_CERTIFICATE is EMPTY!"
          else
            echo "Secret status: FOUND"
            echo "Data size: ${#CERT_DATA} characters"
            # Проверяем, не кукушки ли там вместо документа (Base64 check)
            if echo "$CERT_DATA" | base64 --decode > /dev/null 2>&1; then
              echo "VALIDATION: Base64 format is CORRECT"
            else
              echo "VALIDATION: ERROR! Data is corrupted"
            fi
          fi
