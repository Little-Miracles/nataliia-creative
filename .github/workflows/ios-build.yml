name: iOS Surgery Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Surgery on Flutter Tools
        run: |
          sed -i '' 's/final String? deviceId = buildSettings\["TARGET_DEVICE_IDENTIFIER"\];/final String? deviceId = "GenericDevice";/g' $FLUTTER_ROOT/packages/flutter_tools/lib/src/build_info.dart || true
          sed -i '' 's/final String deviceId = buildSettings\["TARGET_DEVICE_IDENTIFIER"\]!;/final String deviceId = "GenericDevice";/g' $FLUTTER_ROOT/packages/flutter_tools/lib/src/build_info.dart || true
          rm -f $FLUTTER_ROOT/bin/cache/flutter_tools.snapshot

      - name: Setup Certificates
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > cert.p12
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build Application
        run: |
          flutter pub get
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../SmartBody_Surgical_Result.ipa Payload
            
      - name: Deliver Product
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surgical-build-artifact
          path: SmartBody_Surgical_Result.ipa
