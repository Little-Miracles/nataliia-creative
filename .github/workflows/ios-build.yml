name: SMART-BODY-LIFE-FINAL-TRIUMPH

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. ЗАГРУЗКА КОДА
        uses: actions/checkout@v4

      - name: 2. УСТАНОВКА Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: 3. УСТАНОВКА FLUTTER 3.29.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: 4. СОЗДАНИЕ КОНФИГУРАЦИЙ ИЗ ВАШИХ СЕКРЕТОВ
        run: |
          # 1. Создаем папку для профиля
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          # 2. Берем профиль из вашего секрета PROVISIONING_PROFILE_BASE64
          # и превращаем его в правильный файл f2e7364b...
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/f2e7364b-98c7-44ad-a0dc-84acd2d0fd80.mobileprovision
          
          # 3. Создаем .env из вашего секрета ENV_FILE
          echo "${{ secrets.ENV_FILE }}" > .env
          
          echo "Все файлы успешно извлечены из вашей секретки."

      - name: 5. ОБНОВЛЕНИЕ БИБЛИОТЕК
        run: |
          flutter pub upgrade
          flutter pub get

      - name: 6. НАСТРОЙКА Xcode (РУЧНОЙ РЕЖИМ)
        run: |
          # Принудительно отключаем автоматику и прописываем ваш UUID
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \".*\";/PROVISIONING_PROFILE_SPECIFIER = \"SMART_DISTRIBUTION\";/g" ios/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/PROVISIONING_PROFILE = \".*\";/PROVISIONING_PROFILE = \"f2e7364b-98c7-44ad-a0dc-84acd2d0fd80\";/g" ios/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/DEVELOPMENT_TEAM = \".*\";/DEVELOPMENT_TEAM = \"PCSW3AKAPF\";/g" ios/Runner.xcodeproj/project.pbxproj

      - name: 7. СБОРКА IPA ДЛЯ ТРАНСПОРТЕРА
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define-from-file=.env \
            --provisioning-profile=f2e7364b-98c7-44ad-a0dc-84acd2d0fd80
