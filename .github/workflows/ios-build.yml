name: SMART-BODY-LIFE-FINAL-BUILD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. Prepare Dependencies
        run: |
          # Устанавливаем библиотеки (включая ваш health 9.0.1)
          flutter pub get

      - name: 4. Build iOS App
        run: |
          # Теперь Котик видит файл Runner.xcodeproj и начнет сборку
          flutter build ios --release --no-codesign

      - name: 5. Deliver Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBodyLife_iOS_App
          path: build/ios/iphoneos/*.app
          if-no-files-found: warn
          retention-days: 5
