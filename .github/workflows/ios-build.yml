name: iOS Global Concept Redirection
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Deep Redefinition of Concepts
        run: |
          # 1. Мы подменяем понятие идентификатора ВЕЗДЕ.
          find $FLUTTER_ROOT -name "*.dart" -exec sed -i '' 's/buildSettings\["TARGET_DEVICE_IDENTIFIER"\]/ "GenericDevice" /g' {} +
          
          # 2. А теперь — УСМИРЯЕМ того самого охранника на строке 237.
          # Мы заменяем жесткое требование "!" на мягкое согласие.
          find $FLUTTER_ROOT -name "xcode_backend.dart" -exec sed -i '' 's/! \/\/ \/ \/ NULL CHECK/ ?? "GenericDevice" /g' {} +
          find $FLUTTER_ROOT -name "xcode_backend.dart" -exec sed -i '' 's/buildSettings\["TARGET_DEVICE_IDENTIFIER"\]!/ "GenericDevice" /g' {} +

          # 3. Обновляем кэш Котика, чтобы он забыл старые капризы
          rm -f $FLUTTER_ROOT/bin/cache/flutter_tools.snapshot

      - name: Setup Official Environment
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > cert.p12
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build with Universal Concept
        run: |
          flutter pub get
          # Подмена понятия "Чистка" на "Сохранение универсальности"
          export FLUTTER_XCODE_THIN_ARCHIVE=false
          flutter build ios --release --no-codesign
          
          # Собираем результат в итоговую форму
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../SmartBody_Final_Result.ipa Payload
            
      - name: Delivery
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-build-artifact
          path: SmartBody_Final_Result.ipa
