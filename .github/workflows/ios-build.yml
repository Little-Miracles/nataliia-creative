name: FINAL-ARCHIVE-GET

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. The Miracle Fix (Confirmed)
        run: |
          flutter pub get
          rm -rf ios/Runner.xcodeproj
          rm -rf ios/Runner.xcworkspace
          PROJECT_NAME=$(grep '^name:' pubspec.yaml | awk '{print $2}')
          flutter create . --platforms ios --org com.nataliia --project-name $PROJECT_NAME
          sed -i '' 's/embed_and_thin//g' ios/Runner.xcodeproj/project.pbxproj
          # Вписываем твой ID, чтобы проект знал хозяина
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = "PCSW3AKAPF";/g' ios/Runner.xcodeproj/project.pbxproj

      - name: 4. Build Archive
        run: |
          # Собираем архив (IPA) без подписи - это создаст файл .xcarchive
          flutter build ipa --release --no-codesign
        env:
          CERT_DATA: ${{ secrets.P12_BASE64 }}
          PROF_DATA: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}

      - name: 5. Export Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_Final_IPA
          # Это путь к твоему готовому приложению
          path: build/ios/archive/Runner.xcarchive
