name: SMART-BODY-LIFE-FINAL-PACKAGE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. Загрузка кода
        uses: actions/checkout@v4

      - name: 2. Оборудование Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: 3. Новый Flutter 3.29.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: 4. УСТАНОВКА ПРОФИЛЯ В СИСТЕМУ (ВМЕСТО ПЕРЕТАСКИВАНИЯ)
        run: |
          # Создаем папку, которую требует Xcode
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          # Копируем профиль под его системным именем UUID
          # Это то же самое, что "перетащить в док" на вашем ноутбуке
          cp "SMART_DISTRIBUTION_3.mobileprovision" ~/Library/MobileDevice/Provisioning\ Profiles/f2e7364b-98c7-44ad-a0dc-84acd2d0fd80.mobileprovision
          
          # Прописываем в настройки проекта Manual и наш UUID принудительно
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/PROVISIONING_PROFILE = \".*\";/PROVISIONING_PROFILE = \"f2e7364b-98c7-44ad-a0dc-84acd2d0fd80\";/g" ios/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \".*\";/PROVISIONING_PROFILE_SPECIFIER = \"SMART_DISTRIBUTION\";/g" ios/Runner.xcodeproj/project.pbxproj

      - name: 5. Восстановление файла .env из секретов
        run: |
          # Мы берем содержимое из вашей "секретки" и записываем в файл .env
          # Предположим, ваш секрет в GitHub называется ENV_FILE
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "Файл .env успешно восстановлен из секретов."

      - name: 6. Обновление библиотек из письма Apple
        run: |
          flutter pub upgrade device_info_plus url_launcher video_player
          flutter pub get

      - name: 7. ОКОНЧАТЕЛЬНАЯ СБОРКА
        run: |
          # Собираем архив и упаковываем IPA, используя ваш ExportOptions.plist
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define-from-file=.env
