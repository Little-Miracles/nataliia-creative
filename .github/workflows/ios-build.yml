name: SMART-BODY-PROJECT-AUDIT

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: macos-15
    steps:
      - name: 1. Получение кода
        uses: actions/checkout@v4

      - name: 2. Настройка Flutter (3.29.0)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: 3. АУДИТ КОДА (Котик ищет ошибки в Dart)
        run: |
          echo "=== СТАРТ АНАЛИЗА КОДА ==="
          flutter pub get
          flutter analyze || true

      - name: 4. АУДИТ КОНФИГУРАЦИЙ IOS (Поиск несовместимых файлов)
        run: |
          echo "=== ПРОВЕРКА СОСТОЯНИЯ ПРОЕКТА IOS ==="
          # Просим Flutter проверить валидность проекта
          flutter doctor -v
          
          echo "=== АНАЛИЗ СТРУКТУРЫ ПОДОВ ==="
          cd ios
          # Проверка совместимости Podfile с iOS 17 и Flutter 3.29.0
          pod lib lint --allow-warnings || echo "Котик нашел проблемы в зависимостях"
          cd ..

      - name: 5. СРАВНЕНИЕ С ЭТАЛОНОМ (Что нужно заменить?)
        run: |
          echo "=== ПОИСК УСТАРЕВШИХ ФАЙЛОВ ==="
          # Создаем временный чистый проект рядом для сравнения
          flutter create --platforms=ios temp_audit_project
          
          echo "Сравниваю ваш проект с эталоном 3.29.0..."
          diff -r ios/Runner.xcodeproj/project.pbxproj temp_audit_project/ios/Runner.xcodeproj/project.pbxproj || echo "Файл project.pbxproj требует обновлений"
          diff ios/Runner/Info.plist temp_audit_project/ios/Runner/Info.plist || echo "Файл Info.plist имеет расхождения"
          diff ios/Podfile temp_audit_project/ios/Podfile || echo "Podfile отличается от стандартного для 3.29.0"

      - name: 6. ИТОГОВЫЙ ОТЧЕТ КОТИКА
        run: |
          echo "=== ОТЧЕТ ЗАВЕРШЕН ==="
          echo "Наталья, скопируйте весь лог этого шага сюда."
