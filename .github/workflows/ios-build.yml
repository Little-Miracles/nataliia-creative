name: SMART-BODY-LIFE-PACKAGE-ONLY

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Flutter 3.13.9
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          architecture: arm64

      - name: 3. Create .env from Secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: 4. Get Packages
        run: |
          flutter clean
          flutter pub get

      - name: 5. Build Unsigned IPA (Наша посылка)
        run: |
          # Мы официально запрещаем Котику подписывать что-либо
          # Это уберет ошибку "No profiles found"
          flutter build ipa --release --no-codesign

      - name: 6. Save Package for Manual Signing
        uses: actions/upload-artifact@v4
        with:
          name: smart-body-life-unsigned-package
          path: build/ios/archive/*.xcarchive
          retention-days: 10
