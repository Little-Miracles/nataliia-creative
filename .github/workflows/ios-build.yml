name: SmartBody Audit Diagnosis 2026
on:
  workflow_dispatch:
jobs:
  audit:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: List Files
        run: ls -R

      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.IOS_CERTIFICATE }}" ]; then echo "CERT: MISSING"; else echo "CERT: OK"; fi
          if [ -z "${{ secrets.IOS_PROVISION_PROFILE }}" ]; then echo "PROFILE: MISSING"; else echo "PROFILE: OK"; fi
