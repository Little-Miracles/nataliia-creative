name: SMART-BODY-LIFE-TOTAL-SUCCESS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. Получение кода
        uses: actions/checkout@v4

      - name: 2. Настройка Flutter (3.29.0)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: 3. Подготовка безопасности
        run: |
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/f2e7364b-98c7-44ad-a0dc-84acd2d0fd80.mobileprovision
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: 4. Подготовка окружения (Прямое указание пути)
        run: |
          # Создаем папку и пустой скрипт-заглушку
          mkdir -p ios/Flutter
          echo "exit 0" > ios/Flutter/xcode_backend.sh
          chmod +x ios/Flutter/xcode_backend.sh
          
          flutter pub get
          
          # Мы не трогаем ваш файл! 
          # Мы просто говорим системе: "Вот где лежит Flutter", 
          # чтобы Podfile увидел это напрямую.
          export FLUTTER_ROOT=$FLUTTER_HOME
          
          cd ios
          pod install --repo-update
          cd ..

      - name: 5. ЗАПУСК ФИНАЛЬНОЙ СБОРКИ
        id: build_step
        run: |
          echo "--- ЗАПУСК СБОРКИ ВЕРСИИ 3.0.0 (СБОРКА 18) ---"
          
          # Настраиваем параметры экспорта
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>PCSW3AKAPF</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.nataliia.smartbodylife</key>
              <string>f2e7364b-98c7-44ad-a0dc-84acd2d0fd80</string>
            </dict>
            <key>signingStyle</key><string>manual</string>
          </dict>
          </plist>
          EOF

          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define-from-file=.env

      - name: 6. РЕЖИМ НАСТАВНИКА (АНАЛИЗ ОШИБОК)
        if: failure()
        run: |
          echo "--- 🛑 СБОРКА УПАЛА. КОТИК ИЩЕТ ПРИЧИНУ ---"
          
          echo "🔎 ПРОВЕРКА ФАЙЛА Generated.xcconfig:"
          if [ -f "ios/Flutter/Generated.xcconfig" ]; then
            grep -E "FLUTTER_ROOT|FLUTTER_FRAMEWORK_DIR|FLUTTER_BUILD_NAME" ios/Flutter/Generated.xcconfig || echo "⚠️ В файле отсутствуют ключевые строки!"
          else
            echo "❌ Файл Generated.xcconfig НЕ НАЙДЕН в папке ios/Flutter!"
          fi

          echo "🔎 ПРОВЕРКА ФАЙЛА project.pbxproj (DEVELOPMENT_TEAM):"
          grep "DEVELOPMENT_TEAM" ios/Runner.xcodeproj/project.pbxproj | grep -v "PCSW3AKAPF" && echo "⚠️ Внимание! Найдены строки с неверным Team ID!" || echo "✅ С Team ID всё в порядке."

          echo "🔎 ПРОВЕРКА ВЕРСИЙ В ПРОЕКТЕ:"
          grep "MARKETING_VERSION" ios/Runner.xcodeproj/project.pbxproj
          grep "CURRENT_PROJECT_VERSION" ios/Runner.xcodeproj/project.pbxproj
          
          echo "---"
          echo "👉 РЕКОМЕНДАЦИЯ: Если вы видите несовпадение данных выше, исправьте их в соответствующих файлах и запустите сборку снова."

      - name: 7. СОХРАНЕНИЕ РЕЗУЛЬТАТА
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: smart-body-life-ipa
          path: build/ios/ipa/*.ipa
