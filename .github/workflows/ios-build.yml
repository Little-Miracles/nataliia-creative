name: iOS Documents Audit (No Lyrics)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Technical Audit (English Commands Only)
        run: |
          # 1. Просим Котика показать настройки в главном файле
          echo "CHECKING_PROJECT_FILE_SETTINGS"
          grep -E "ONLY_ACTIVE_ARCH|SDKROOT|ARCHS|TARGET_DEVICE_FAMILY" ios/Runner.xcodeproj/project.pbxproj || true
          
          # 2. Просим показать содержимое скрытых конфигов
          echo "CHECKING_FLUTTER_CONFIG_FILES"
          ls ios/Flutter/*.xcconfig && cat ios/Flutter/*.xcconfig || echo "No config files found"
          
          # 3. Просим показать версию iOS в списке оборудования
          echo "CHECKING_PODFILE_VERSION"
          [ -f ios/Podfile ] && grep -E "platform :ios|deployment_target" ios/Podfile || echo "No Podfile"
