name: Build and Deploy iOS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Install Dependencies
        run: |
          flutter pub get
          flutter precache --ios
          cd ios
          pod install --repo-update

      - name: Build iOS App
        run: |
          # Взламываем конфиг Flutter, чтобы принудительно убрать Null значение
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGN_IDENTITY=-" >> ios/Flutter/Generated.xcconfig
          echo "EXPANDED_CODE_SIGN_IDENTITY=-" >> ios/Flutter/Generated.xcconfig
          
          # Собираем
          flutter build ios --release --no-codesign --no-tree-shake-icons --extra-front-end-options=--no-implicit-dynamic-reexport
            
      - name: Create Payload for IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r SmartBodyLife.ipa Payload

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: SmartBodyLife.ipa
