name: iOS Build SmartBody Life

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # =========================
      # 1. Checkout
      # =========================
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # 2. Flutter Setup
      # =========================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      # =========================
      # 3. Install dependencies
      # =========================
      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      # =========================
      # 4. Apple Signing Setup (YOUR SECRETS)
      # =========================
      - name: Install certificates
        env:
          DEV_P12_BASE64: ${{ secrets.DEV_P12_BASE64 }}
          P12_BASE64: ${{ secrets.P12_BASE64 }}

          DEV_PROVISIONING_PROFILE_BASE64: ${{ secrets.DEV_PROVISIONING_PROFILE_BASE64 }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}

          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -e

          echo "=== START SIGNING SETUP ==="

          CERT_PATH=$RUNNER_TEMP/cert.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db

          # Pick certificate (DEV or PROD fallback)
          if [ -n "$DEV_P12_BASE64" ]; then
            echo "$DEV_P12_BASE64" | base64 --decode > "$CERT_PATH"
          else
            echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          fi

          # Pick provisioning profile
          if [ -n "$DEV_PROVISIONING_PROFILE_BASE64" ]; then
            echo "$DEV_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          else
            echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          fi

          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -A

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

          echo "=== SIGNING DONE ==="

      # =========================
      # 5. Pods
      # =========================
      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      # =========================
      # 6. Build IPA
      # =========================
      - name: Build IPA
        run: |
          flutter build ipa --release --no-codesign

      # =========================
      # 7. Upload IPA
      # =========================
      - name: Upload IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody-Life-iOS
          path: build/ios/ipa/*.ipa
