name: SmartBody iOS Build Stable

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Install dependencies (SAFE MODE)
        run: |
          flutter pub get
          cd ios
          pod install
          cd ..

      - name: Build IPA (NO WEB, NO CLEAN DESTRUCTION)
        run: |
          flutter build ipa --release --no-codesign

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_Life_Build
          # Исправил тут: берем всю папку сборки, чтобы точно найти приложение
          path: build/ios/archive/Runner.xcarchive
