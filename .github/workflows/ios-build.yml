name: SMART-BODY-LIFE-DIAGNOSTIC

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Успокаиваем Котика по поводу Node.js

jobs:
  check-files:
    runs-on: macos-15
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. List all files (The Light)
        run: |
          echo "Current location:"
          pwd
          echo "What is inside the main folder:"
          ls -F
          echo "Is there an ios folder here? Let's check specifically:"
          ls -d ios/ || echo "Folder 'ios' is NOT found in the root"
