name: SMART-BODY-LIFE-TEST-RECONSTRUCTION

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. Загрузка кода
        uses: actions/checkout@v4

      - name: 2. Переключение на Xcode 26.3
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version

      - name: 3. Установка Flutter 3.29.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'

      - name: 4. Загрузка ключей (Сертификаты)
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 5. Настройка системной среды (Manual Signing)
        run: |
          # 1. Создаем папку и кладем туда профиль под его UUID
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          find . -name "SMART_DISTRIBUTION_3.mobileprovision" -exec cp {} ~/Library/MobileDevice/Provisioning\ Profiles/f2e7364b-98c7-44ad-a0dc-84acd2d0fd80.mobileprovision \;

          # 2. МЯГКОЕ ПЕРЕКЛЮЧЕНИЕ: Говорим проекту использовать Ручной стиль и наш UUID
          # Мы заменяем Automatic на Manual прямо в файле проекта
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Указываем, какой именно UUID использовать для сборки[cite: 7]
          find . -name "project.pbxproj" -exec sed -i '' "s/PROVISIONING_PROFILE = \".*\";/PROVISIONING_PROFILE = \"f2e7364b-98c7-44ad-a0dc-84acd2d0fd80\";/g" {} +
          find . -name "project.pbxproj" -exec sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \".*\";/PROVISIONING_PROFILE_SPECIFIER = \"SMART_DISTRIBUTION\";/g" {} +
          
          echo "Стиль подписи переключен на Manual, профиль привязан."

      - name: 6. Обновление плагинов (pub upgrade)
        run: |
          flutter pub upgrade
          flutter pub get

      - name: 7. Сборка (Тестовая, без смены номера)
        run: |
          # Используем ваш ExportOptions.plist для ручной подписи[cite: 2]
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: 8. ГЛУБОКАЯ ДИАГНОСТИКА ПЕЧАТЕЙ
        run: |
          APP_PATH=$(find build/ios/archive -name "*.app" | head -n 1)
          echo "=== ПРОВЕРКА ПОДПИСИ ==="
          codesign --verify --deep --verbose "$APP_PATH"
          echo -e "\n=== ПОИСК МАНИФЕСТОВ (Privacy Info) ==="
          # Ищем те самые файлы, на которых настаивает Apple[cite: 4, 7]
          find "$APP_PATH/Frameworks" -name "PrivacyInfo.xcprivacy"
