name: iOS System Simulation Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Setup Simulation Env
        run: |
          # Мы не меняем код. Мы создаем системную иллюзию, что телефон подключен.
          # Эти переменные Apple считает "священными", и если они заполнены,
          # скрипт на строке 237 получит ответ Раньше, чем успеет выдать ошибку.
          echo "TARGET_DEVICE_IDENTIFIER=GenericDevice" >> $GITHUB_ENV
          echo "XCODE_PRODUCT_BUNDLE_IDENTIFIER=com.nataliia.smartbodylife" >> $GITHUB_ENV
          
          # Заставляем систему думать, что замер уже произведен
          export TARGET_DEVICE_IDENTIFIER=GenericDevice

      - name: Setup Certificates
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > cert.p12
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build Application
        run: |
          flutter pub get
          # Мы используем специальный флаг, который говорит Xcode:
          # "Считай, что ты собираешь для любого iPhone, не ищи конкретный"
          flutter build ios --release --no-codesign --project-name=Runner --flavor=
          
          # Упаковка результата
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../SmartBody_Simulated_Success.ipa Payload
            
      - name: Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulated-build-artifact
          path: SmartBody_Simulated_Success.ipa
