name: SMART-BODY-LIFE-FINAL-TRIUMPH

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. Check Folders
        run: ls -R  # Котик просто перечислит все папки, чтобы мы увидели правду

      - name: 4. Emergency Restore (Only if missing)
        run: |
          # Эта команда создаст структуру, ТОЛЬКО если папки ios реально нет
          if [ ! -d "ios" ]; then
            flutter create . --platforms ios --org com.nataliia --project-name smartbodylife
          fi

      - name: 5. Prepare Dependencies
        run: flutter pub get  # Подтягиваем вашу health 9.0.1

      - name: 6. Deliver Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBodyLife_iOS_App
          path: build/ios/iphoneos/*.app
          if-no-files-found: warn
          retention-days: 5
