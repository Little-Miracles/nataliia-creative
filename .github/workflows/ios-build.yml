name: iOS Build SmartBody Life

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Fix Xcode Backend and Pods
        run: |
          # 1. Принудительная настройка проекта
          flutter create . --platforms ios --org com.nataliia --project-name smart_body_life
          
          # 2. Очистка старых "хвостов"
          flutter clean
          flutter pub get
          
          # 3. Лекарство для строки 237: Прописываем пути для Xcode вручную
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          pod install --repo-update
          cd ..

      - name: Build IPA (Final Force)
        run: |
          # Собираем архив, явно указывая Xcode, что мы главные
          flutter build ipa --release --no-codesign
          
      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_Life_App
          path: build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app
