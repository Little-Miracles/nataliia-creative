name: SmartBody Master Final 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Modern Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Fix Directory Logic
        run: |
          # Удаляем ошибочную папку с одной i
          rm -rf android/app/src/main/kotlin/com/natalia
          
          # Создаем правильную структуру для com.nataliia
          flutter create . --platforms ios,android --org com.nataliia
          
          # Устанавливаем универсальный стандарт Generic
          mkdir -p ios/Flutter
          echo "FLUTTER_TARGET_DEVICE_ID=generic" >> ios/Flutter/Generated.xcconfig
          echo "TARGET_DEVICE_IDENTIFIER=generic" >> ios/Flutter/Generated.xcconfig

      - name: Production Assembly
        run: |
          flutter pub get
          # Сборка финального архива без проверки физического устройства
          flutter build ipa --release --no-codesign
          
          # Упаковка в IPA
          cd build/ios/archive/Runner.xcarchive/Products/Applications
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../../../SmartBody_V2026_Perfect.ipa Payload
            
      - name: Deliver Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smartbody-ready
          path: SmartBody_V2026_Perfect.ipa
