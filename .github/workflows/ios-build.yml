name: SMART-BODY-LIFE-FINAL-TRIUMPH

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. Prepare Dependencies
        run: |
          # Используем ваш pubspec.yaml, где зафиксирована версия 9.0.1
          flutter pub get

      - name: 4. Build iOS App
        run: |
          # Котик заходит в ту самую папку ios, которую вы видите на фото
          flutter build ios --release --no-codesign

      - name: 5. Deliver Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBodyLife_App
          path: build/ios/iphoneos/*.app
          if-no-files-found: warn
          retention-days: 5
