name: SMART-BODY-LIFE-FINAL-DELIVERY

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Setup Flutter 3.13.9
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          architecture: arm64

      - name: 3. Create .env from Secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: 4. Import Hybrid Certificate (Ваша печать)
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }} # Ваш new_dist.p12
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: 5. Install Distribution Profile (Ваш паспорт)
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # Мы кладем именно SMART_DISTRIBUTION профиль
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/f2e7364b-98c7-44ad-a0dc-84acd2d0fd80.mobileprovision

      - name: 6. Get Packages
        run: |
          flutter clean
          flutter pub get

      - name: 7. Build and Seal IPA (Финальная упаковка)
        run: |
          # ВАЖНО: Мы запрещаем Котику искать профили разработки (--no-codesign на этапе архива)
          # Но разрешаем упаковать финальный IPA через ваш ExportOptions
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist

      - name: 8. Give Me the Finished Box
        uses: actions/upload-artifact@v4
        with:
          name: smart-body-life-READY-TO-SEND
          # Котик выдаст вам готовый .ipa в этой папке
          path: build/ios/ipa/*.ipa
          retention-days: 10
