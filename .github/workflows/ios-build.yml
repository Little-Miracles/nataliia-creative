name: P-MAGIC-V2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: 3. The Great Cleanup (Universal Mode)
        run: |
          flutter pub get
          
          # Заставляем систему игнорировать ошибки кодировки (illegal byte sequence)
          export LC_ALL=C
          
          # Меняем все тексты (natalia, example -> nataliia)
          find . -type f -not -path '*/.*' -exec sed -i '' 's/com.example/com.nataliia/g' {} +
          find . -type f -not -path '*/.*' -exec sed -i '' 's/com.natalia/com.nataliia/g' {} +
          find . -type f -not -path '*/.*' -exec sed -i '' 's/smart_body_life/smartbodylife/g' {} +

          # Официально обновляем проект под одним именем
          flutter create . --platforms ios --org com.nataliia
          
          # Создаем инструкцию для iOS
          flutter build ios --config-only --release

       Maryland - name: 4. Build Mobile App
        run: |
          flutter build ipa --release --no-codesign
        env:
          CERT_DATA: ${{ secrets.P12_BASE64 }}
          PROF_DATA: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}

      - name: 5. Save Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartBody_Final_M
          path: build/ios/archive/Runner.xcarchive
