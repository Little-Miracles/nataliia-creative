name: smart_body_life
description: A new Flutter project.
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  intl: ^0.19.0
  image_picker: ^1.1.2
  http_parser: 4.0.0
  http: ^1.2.1
  video_player: ^2.8.1
  health: ^10.1.0
  fl_chart: 0.63.0
  add_2_calendar: ^3.0.1
  sqflite: ^2.3.0
  collection: 1.19.1
  flutter_local_notifications: ^18.0.1
  flutter_dotenv: ^5.1.0
  path_provider: ^2.1.3
  audioplayers: ^6.0.0
  flutter_timezone: ^4.1.1
  permission_handler: ^11.3.1
  url_launcher: ^6.2.5
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - ui_images/   
    - res_gym/
    - avatars/
    - instructions/
    - images/
    - videos/
    - item_male/icons/
    - item_female/icons/
    - item_male/layers/
    - item_female/layers/
    - assets/sounds/
    - assets/images/soups/
    - assets/images/salads/
    - assets/images/mains/
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "ui_images/icon.png"
  adaptive_icon_background: "#001A10"
  adaptive_icon_foreground: "ui_images/icon.png"

dependency_overrides: 
  meta: 1.15.0
  path: 1.9.0
  intl: 0.19.0
  shared_preferences: 2.2.3
  timezone: 0.9.2
