name: smart_body_life
description: A new Flutter project.
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  intl: 0.19.0
  image_picker: ^1.0.0

  
  
  
  video_player: 2.4.5
  health: 9.0.0
  fl_chart: 0.63.0
  add_2_calendar: ^2.0.0
  sqflite: ^2.3.0

  # ИСПРАВЛЕНО: Приземляем версию для совместимости с Flutter 3.13!
  collection: 1.17.2

  flutter_local_notifications: ^17.0.0
  flutter_dotenv: ^5.1.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - ui_images/   
    - res_gym/
    - avatars/
    - instructions/
    - images/
    - videos/
    - item_male/icons/
    - item_female/icons/
    - item_male/layers/
    - item_female/layers/
    - assets/sounds/
    - assets/images/soups/
    - assets/images/salads/
    - assets/images/mains/
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "ui_images/icon.png"
  adaptive_icon_background: "#001A10"
  adaptive_icon_foreground: "ui_images/icon.png"

dependency_overrides: 
  meta: 1.15.0
  path: 1.8.3
  intl: 0.19.0
  path_provider: 2.1.1
  shared_preferences: 2.2.2
  # ИСПРАВЛЕНО: Ставим стабильную версию для SDK 3.13
  flutter_timezone: ^4.1.1
  collection: 1.18.0 
  timezone: 0.9.2
  permission_handler: 11.0.1
  url_launcher: 6.1.14
  url_launcher_ios: 6.2.0
  google_fonts: 6.1.0
  http: 1.1.0
  audioplayers: 5.2.1
